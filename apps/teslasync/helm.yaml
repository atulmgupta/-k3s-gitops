# =============================================================================
# TeslaSync — Helm Application (ArgoCD)
# =============================================================================
# Real-time Tesla vehicle data platform using the TimescaleDB-backed chart.
# Secrets are managed via SOPS in resources.yaml using existingSecret.
# =============================================================================
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: teslasync
  namespace: argocd
  labels:
    tier: apps
spec:
  project: default
  source:
    repoURL: ghcr.io/ev-dev-labs/charts
    chart: teslasync
    targetRevision: "0.32.8"
    helm:
      releaseName: teslasync
      valuesObject:
        replicaCount: 1
        image:
          repository: ghcr.io/ev-dev-labs/teslasync-api
          tag: "0.32.8"

        secrets:
          existingSecret: teslasync

        encryption:
          key: ""

        auth:
          jwtSecret: ""

        # Web Push (VAPID) — Phase 40 / Prompt 52
        # Chart 0.32.8 has no `webPush` value-block, but every deployment uses
        # `envFrom: secretRef: existingSecret`, so all 3 VAPID values are
        # delivered via the SOPS-managed Secret as env vars:
        #   TESLASYNC_VAPID_PUBLIC_KEY, TESLASYNC_VAPID_PRIVATE_KEY, TESLASYNC_VAPID_SUBJECT
        # When chart bumps to a version with native webPush support, switch to
        # an inline `webPush.publicKey` block here and drop the public key from SOPS.
        # ⚠️  Rotating these keys invalidates every existing browser subscription.

        config:
          apiEndpoint: http://teslasync-api.teslasync.svc.cluster.local:8080
          webEndpoint: https://teslasync.cyphers.app
          browserApiBase: ""
          logLevel: info
          pollInterval: 30s
          sleepPollMultiplier: 4
          forwardAuthHeader: ""
          googleMaps:
            apiKey: ""
          azureMaps:
            apiKey: ""
          openTelemetry:
            enabled: false
            endpoint: jaeger:4317
            insecure: true
            serviceName: teslasync
          # Inbound API call logs — Phase 38-10
          # Persists every inbound /api/v1 request to api_call_logs.
          # Chart defaults (shown below) are sensible — uncomment only to override.
          # apiLogs:
          #   inboundEnabled: true     # API_LOGS_INBOUND_ENABLED
          #   captureBodies: false     # API_LOG_CAPTURE_BODIES (10 KB cap)
          #   queueCapacity: 4096      # API_LOG_QUEUE_CAPACITY
          #   batchSize: 100           # API_LOG_BATCH_SIZE
          #   flushInterval: "1s"      # API_LOG_FLUSH_INTERVAL

        resources:
          requests: { cpu: 100m, memory: 128Mi }
          limits: { cpu: 500m, memory: 512Mi }

        metrics:
          enabled: true
          serviceMonitor:
            enabled: true
            namespace: prometheus
            interval: "30s"
            namespaceSelector:
              matchNames:
                - teslasync

        service:
          port: 8080
          type: ClusterIP

        tesla:
          apiBaseUrl: https://fleet-api.prd.na.vn.cloud.tesla.com
          authUrl: "https://auth.tesla.com"
          timeout: "30s"
          redirectUri: https://teslasync.cyphers.app/api/v1/auth/callback

        retention:
          {}
          # Audit log retention — Phase 40 / Prompt 49
          # Defaults to API server values (365 days / 30 days) when unset.
          # To override, REMOVE the `{}` line above and uncomment:
          # auditDays: 365      # AUDIT_RETENTION_DAYS — hard-delete after this
          # auditIpDays: 30     # AUDIT_IP_RETENTION_DAYS — null IP/UA after this

        gasPrice:
          enabled: true
          pollInterval: 15d

        web:
          enabled: true
          replicaCount: 1
          image:
            repository: ghcr.io/ev-dev-labs/teslasync-web
            tag: "0.32.8"
            pullPolicy: IfNotPresent
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 200m, memory: 128Mi }
          service:
            port: 80
            type: LoadBalancer
            loadBalancerIP: "192.168.68.220"

        commandProxy:
          enabled: true
          image:
            repository: tesla/vehicle-command
            tag: latest
            pullPolicy: IfNotPresent
          secretName: tesla-command-proxy
          resources:
            requests: { cpu: 50m, memory: 32Mi }
            limits: { cpu: 200m, memory: 128Mi }
          service:
            port: 4443
            type: ClusterIP

        fleetTelemetry:
          enabled: true
          host: telemetry.cyphers.app
          image: tesla/fleet-telemetry:latest
          batchMs: 100
          fallbackPollInterval: "5m"
          staleTimeout: "15m"
          snapshotWriteInterval: "1s"
          cleanupInterval: "2m"
          staleSessionTimeout: "5m"
          liveSignalStoreMode: hybrid
          topicBase: telemetry
          resources:
            requests: { cpu: 100m, memory: 64Mi }
            limits: { cpu: 500m, memory: 256Mi }
          service:
            port: 4443
            type: ClusterIP
          tls:
            secretName: production-cyphers-app-tls
          metrics:
            serviceMonitor:
              enabled: true
              interval: "30s"
          ingressRouteTCP:
            enabled: true
            annotations:
              kubernetes.io/ingress.class: traefik-external
            entryPoints:
              - websecure
            host: telemetry.cyphers.app

        exportWorker:
          enabled: true
          replicaCount: 1
          dbMaxConns: 5
          dbMinConns: 2
          image:
            repository: ghcr.io/ev-dev-labs/teslasync-export-worker
            tag: "0.32.8"
            pullPolicy: IfNotPresent
          resources:
            requests: { cpu: 100m, memory: 64Mi }
            limits: { cpu: 500m, memory: 512Mi }
          service:
            port: 8082
            type: ClusterIP

        notificationWorker:
          enabled: true
          replicaCount: 1
          dbMaxConns: 5
          dbMinConns: 2
          image:
            repository: ghcr.io/ev-dev-labs/teslasync-notification-worker
            tag: "0.32.8"
            pullPolicy: IfNotPresent
          resources:
            requests: { cpu: 50m, memory: 32Mi }
            limits: { cpu: 200m, memory: 128Mi }
          service:
            port: 8081
            type: ClusterIP

        automationWorker:
          enabled: true
          replicaCount: 1
          dbMaxConns: 5
          dbMinConns: 2
          image:
            repository: ghcr.io/ev-dev-labs/teslasync-automation-worker
            tag: "0.32.8"
            pullPolicy: IfNotPresent
          resources:
            requests: { cpu: 100m, memory: 64Mi }
            limits: { cpu: 500m, memory: 256Mi }
          service:
            port: 8083
            type: ClusterIP

        postgresql:
          enabled: false
          maxConns: 25
          minConns: 5
          connectTimeout: 5
          statementTimeout: 30000
          healthCheckPeriod: "5s"
          external:
            host: timescaledb.timescaledb.svc.cluster.local
            port: 5432
            database: teslasync
            username: teslasync
            sslMode: disable

        redis:
          enabled: false
          db: 1
          external:
            host: redis-master.redis.svc.cluster.local
            port: 6379

        mongodb:
          enabled: false
          database: teslasync_dev
          ttlDays: 7
          external:
            uri: "external" #if using an external MongoDB instance

        mqtt:
          enabled: false
          clientId: "teslasync"
          prefix: "teslasync"
          external:
            host: mqtt-emqx.mqtt.svc.cluster.local
            port: 1883

        grafana:
          enabled: false

        jaeger:
          enabled: false

        ingress:
          enabled: false

        ingressRoute:
          enabled: true
          annotations:
            kubernetes.io/ingress.class: traefik-external
          entryPoints:
            - websecure
          namespace: teslasync
          # SSE bypass route — auto-added before catch-all when ForwardAuth is used.
          # Bypasses Authentik for /api/v1/events so the Go backend validates JWT
          # directly (Authentik middleware can break long-lived SSE connections).
          # Uncomment if SSE clients get disconnected/401'd by Authentik.
          # sseBypass:
          #   match: "Host(`teslasync.cyphers.app`) && PathPrefix(`/api/v1/events`)"
          #   middlewares:
          #     - name: default-headers
          #       namespace: traefik
          #   services:
          #     - name: teslasync-web
          #       port: 80
          routes:
            - kind: Rule
              match: "Host(`teslasync.cyphers.app`) && PathPrefix(`/.well-known`)"
              middlewares:
                - name: default-headers
                  namespace: traefik
              services:
                - name: teslasync-web
                  port: 80
            - kind: Rule
              match: "Host(`teslasync.cyphers.app`)"
              middlewares:
                - name: authentik-auth
                  namespace: authentik
                - name: default-headers
                  namespace: traefik
              services:
                - name: teslasync-web
                  port: 80
          tls:
            enabled: true
            secretName: production-cyphers-app-tls

  destination:
    server: https://kubernetes.default.svc
    namespace: teslasync
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: tesla-command-proxy
      jsonPointers:
        - /data
        - /stringData
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
