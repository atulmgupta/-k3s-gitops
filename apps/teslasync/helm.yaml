# =============================================================================
# TeslaSync — Kustomize Application (ArgoCD)
# =============================================================================
# Real-time Tesla vehicle data platform. Kustomize renders the Helm chart and
# overlays SOPS-decrypted secrets via KSOPS — single source of truth.
# =============================================================================
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: teslasync
  namespace: argocd
  labels:
    tier: apps
spec:
  project: default
  source:
    repoURL: https://github.com/atulmgupta/-k3s-gitops.git
    targetRevision: main
    path: apps/teslasync/resources
    kustomize: {}
  destination:
    server: https://kubernetes.default.svc
    namespace: teslasync
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
