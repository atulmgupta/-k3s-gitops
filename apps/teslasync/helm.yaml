# =============================================================================
# TeslaSync — Helm Application (ArgoCD)
# =============================================================================
# Real-time Tesla vehicle data platform. Chart deploys: API, Web, Command Proxy,
# Fleet Telemetry, Export Worker, Notification Worker.
# Secrets managed via SOPS in resources.yaml using existingSecret.
# =============================================================================
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: teslasync
  namespace: argocd
  labels:
    tier: apps
spec:
  project: default
  source:
    repoURL: ghcr.io/ev-dev-labs/charts
    chart: teslasync
    targetRevision: "0.32.0-rc.refactor-cleanup.b1d1dc5"
    helm:
      releaseName: teslasync
      valuesObject:
        replicaCount: 1
        image:
          repository: ghcr.io/ev-dev-labs/teslasync-api
          pullPolicy: IfNotPresent

        secrets:
          existingSecret: teslasync

        encryption:
          key: ""

        auth:
          jwtSecret: ""

        config:
          apiEndpoint: http://teslasync-api.teslasync.svc.cluster.local:8080
          webEndpoint: https://teslasync.cyphers.app
          browserApiBase: ""
          logLevel: info
          pollInterval: 30s
          sleepPollMultiplier: 4
          authentikURL: http://authentik-server.authentik.svc.cluster.local/application/o/wZacMmH9lDFSCE1aWLC90PV2x6DIESIshUTJ5SqM/jwks/
          authentikHMACKey: ""
          googleMaps:
            apiKey: ""
          azureMaps:
            apiKey: ""
          openTelemetry:
            enabled: false
            endpoint: jaeger:4317
            insecure: true
            serviceName: teslasync

        resources:
          requests: { cpu: 100m, memory: 128Mi }
          limits: { cpu: 500m, memory: 512Mi }

        metrics:
          enabled: true
          serviceMonitor:
            enabled: true
            namespace: prometheus
            interval: "30s"
            namespaceSelector:
              matchNames:
                - teslasync

        service:
          port: 8080
          type: ClusterIP

        tesla:
          apiBaseUrl: https://fleet-api.prd.na.vn.cloud.tesla.com
          authUrl: "https://auth.tesla.com"
          timeout: "30s"
          redirectUri: https://teslasync.cyphers.app/api/v1/auth/callback

        retention:
          signalHistoryDays: 15

        gasPrice:
          enabled: true
          pollInterval: 15d

        web:
          enabled: true
          replicaCount: 1
          image:
            repository: ghcr.io/ev-dev-labs/teslasync-web
            pullPolicy: IfNotPresent
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 200m, memory: 128Mi }
          service:
            port: 80
            type: ClusterIP

        commandProxy:
          enabled: true
          image:
            repository: tesla/vehicle-command
            tag: latest
            pullPolicy: IfNotPresent
          secretName: tesla-command-proxy
          resources:
            requests: { cpu: 50m, memory: 32Mi }
            limits: { cpu: 200m, memory: 128Mi }
          service:
            port: 4443
            type: ClusterIP

        fleetTelemetry:
          enabled: true
          host: telemetry.cyphers.app
          image: tesla/fleet-telemetry:latest
          batchMs: 100
          fallbackPollInterval: 60s
          staleTimeout: 5m
          snapshotWriteInterval: "1s"
          cleanupInterval: "2m"
          staleSessionTimeout: "5m"
          topicBase: telemetry
          resources:
            requests: { cpu: 100m, memory: 64Mi }
            limits: { cpu: 500m, memory: 256Mi }
          service:
            port: 4443
            type: ClusterIP
          tls:
            secretName: production-cyphers-app-tls
          ingressRouteTCP:
            enabled: true
            annotations:
              kubernetes.io/ingress.class: traefik-external
            entryPoints:
              - websecure
            host: telemetry.cyphers.app

        exportWorker:
          enabled: true
          replicaCount: 1
          image:
            repository: ghcr.io/ev-dev-labs/teslasync-export-worker
            pullPolicy: IfNotPresent
          resources:
            requests: { cpu: 100m, memory: 64Mi }
            limits: { cpu: 500m, memory: 512Mi }
          service:
            port: 8082
            type: ClusterIP

        notificationWorker:
          enabled: true
          replicaCount: 1
          image:
            repository: ghcr.io/ev-dev-labs/teslasync-notification-worker
            pullPolicy: IfNotPresent
          resources:
            requests: { cpu: 50m, memory: 32Mi }
            limits: { cpu: 200m, memory: 128Mi }
          service:
            port: 8081
            type: ClusterIP

        postgresql:
          enabled: false
          maxConns: 25
          minConns: 5
          external:
            host: postgres-v17-postgresql.postgres-v17.svc.cluster.local
            port: 5432
            database: teslasync
            username: teslasync
            sslMode: disable

        redis:
          enabled: false
          db: 0
          external:
            host: redis-master.redis.svc.cluster.local
            port: 6379

        mongodb:
          enabled: false
          database: teslasync
          ttlDays: 7
          external:
            uri: "external"

        mqtt:
          enabled: false
          external:
            host: mqtt-emqx.mqtt.svc.cluster.local
            port: 1883

        grafana:
          enabled: false

        jaeger:
          enabled: false

        ingress:
          enabled: false

        ingressRoute:
          enabled: true
          annotations:
            kubernetes.io/ingress.class: traefik-external
          entryPoints:
            - websecure
          namespace: teslasync
          routes:
            - kind: Rule
              match: "Host(`teslasync.cyphers.app`) && PathPrefix(`/.well-known`)"
              middlewares:
                - name: default-headers
                  namespace: traefik
              services:
                - name: teslasync-web
                  port: 80
            - kind: Rule
              match: "Host(`teslasync.cyphers.app`) && PathPrefix(`/api/v1/events`)"
              middlewares:
                - name: default-headers
                  namespace: traefik
              services:
                - name: teslasync-web
                  port: 80
            - kind: Rule
              match: "Host(`teslasync.cyphers.app`)"
              middlewares:
                - name: authentik-auth
                  namespace: authentik
                - name: default-headers
                  namespace: traefik
              services:
                - name: teslasync-web
                  port: 80
          tls:
            enabled: true
            secretName: production-cyphers-app-tls

  destination:
    server: https://kubernetes.default.svc
    namespace: teslasync
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: tesla-command-proxy
      jsonPointers:
        - /data
        - /stringData
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
