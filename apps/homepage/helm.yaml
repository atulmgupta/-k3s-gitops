# =============================================================================
# Homepage — Helm Application (ArgoCD)
# =============================================================================
# Modern dashboard with Kubernetes service auto-discovery.
# Replaces Homer. Accessible at home.cyphers.app behind authentik.
# =============================================================================
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homepage
  namespace: argocd
  labels:
    tier: tools
spec:
  project: default
  source:
    repoURL: https://jameswynn.github.io/helm-charts
    chart: homepage
    targetRevision: "2.*.*"
    helm:
      releaseName: homepage
      valuesObject:
        image:
          repository: ghcr.io/gethomepage/homepage
          tag: latest

        enableRbac: true

        serviceAccount:
          create: true
          name: homepage

        env:
          HOMEPAGE_ALLOWED_HOSTS: "home.cyphers.app"

        config:
          kubernetes:
            mode: cluster

          settings:
            title: Cyphers Homelab
            favicon: https://cyphers.app/favicon.ico
            headerStyle: clean
            layout:
              - Infrastructure:
                  style: row
                  columns: 4
              - Applications:
                  style: row
                  columns: 4
              - Services:
                  style: row
                  columns: 4
              - Security:
                  style: row
                  columns: 4
              - Monitoring:
                  style: row
                  columns: 4

          widgets:
            - kubernetes:
                cluster:
                  show: true
                  cpu: true
                  memory: true
                  showLabel: true
                  label: "k3s"
                nodes:
                  show: true
                  cpu: true
                  memory: true
                  showLabel: true
            - search:
                provider: google
                target: _blank

          services:
            - Infrastructure:
                - Traefik:
                    icon: traefik
                    href: https://traefik.cyphers.app
                    description: Ingress Controller
                - ArgoCD:
                    icon: argocd
                    href: https://argocd.cyphers.app
                    description: GitOps CD
                - Authentik:
                    icon: authentik
                    href: https://auth.cyphers.app
                    description: Identity Provider
                - Longhorn:
                    icon: longhorn
                    href: https://longhorn.cyphers.app
                    description: Storage
            - Applications:
                - TeslaSync:
                    icon: tesla
                    href: https://teslasync.cyphers.app
                    description: Tesla Fleet Manager
                - Home Assistant:
                    icon: home-assistant
                    href: https://hass.cyphers.app
                    description: Home Automation
                - VitaSync:
                    icon: mdi-heart-pulse
                    href: https://vitasync.cyphers.app
                    description: Health Sync
                - EchoStats:
                    icon: mdi-chart-bar
                    href: https://echostats.cyphers.app
                    description: Spotify Analytics
                - Plex:
                    icon: plex
                    href: https://plex.cyphers.app
                    description: Media Server
                - IT Tools:
                    icon: it-tools
                    href: https://devtools.cyphers.app
                    description: Developer Utilities
                - Code Server:
                    icon: vscode
                    href: https://code.cyphers.app
                    description: Web IDE
                - Gotify:
                    icon: gotify
                    href: https://gotify.cyphers.app
                    description: Push Notifications
                - Outline:
                    icon: outline
                    href: https://outline.cyphers.app
                    description: Wiki & Docs
                - Mealie:
                    icon: mealie
                    href: https://mealie.cyphers.app
                    description: Recipe Manager
                - Nexus Terminal:
                    icon: mdi-chart-timeline-variant
                    href: https://nexus.cyphers.app
                    description: Stock Intelligence
                - Trilium:
                    icon: mdi-notebook-outline
                    href: https://trilium.cyphers.app
                    description: Notes
                - FreshRSS:
                    icon: freshrss
                    href: https://rss.cyphers.app
                    description: RSS Reader
                - TeslaMate:
                    icon: mdi-car-electric
                    href: https://teslamate.cyphers.app
                    description: Tesla Data Logger
                - Grocy:
                    icon: grocy
                    href: https://grocy.cyphers.app
                    description: Household Management
            - Monitoring:
                - Grafana:
                    icon: grafana
                    href: https://grafana.cyphers.app
                    description: Dashboards
                - Prometheus:
                    icon: prometheus
                    href: https://prometheus.cyphers.app
                    description: Metrics
                - Uptime Kuma:
                    icon: uptime-kuma
                    href: https://kuma.cyphers.app
                    description: Uptime Monitoring
                - Gatus:
                    icon: gatus
                    href: https://gatus.cyphers.app
                    description: Health Status
                - Dozzle:
                    icon: dozzle
                    href: https://dozzle.cyphers.app
                    description: Log Viewer
                - Speedtest:
                    icon: mdi-speedometer
                    href: https://speedtest.cyphers.app
                    description: ISP Speed Monitor
                - Headlamp:
                    icon: kubernetes-dashboard
                    href: https://k8s.cyphers.app
                    description: Kubernetes Dashboard
                - Netdata:
                    icon: netdata
                    href: https://netdata.cyphers.app
                    description: System Monitoring

            - Services:
                - n8n:
                    icon: n8n
                    href: https://n8n.cyphers.app
                    description: Workflow Automation
                - Ntfy:
                    icon: ntfy
                    href: https://ntfy.cyphers.app
                    description: Push Notifications
                - FileBrowser:
                    icon: filebrowser
                    href: https://files.cyphers.app
                    description: File Manager
                - Syncthing:
                    icon: syncthing
                    href: https://syncthing.cyphers.app
                    description: File Sync
                - Duplicati:
                    icon: duplicati
                    href: https://duplicati.cyphers.app
                    description: Backups
                - Changedetection:
                    icon: changedetection-io
                    href: https://changedetection.cyphers.app
                    description: Website Monitor
                - Nextcloud:
                    icon: nextcloud
                    href: https://nextcloud.cyphers.app
                    description: Cloud Storage
            - Security:
                - Vaultwarden:
                    icon: vaultwarden
                    href: https://vault.cyphers.app
                    description: Password Manager
                - 2FAuth:
                    icon: mdi-two-factor-authentication
                    href: https://2fauth.cyphers.app
                    description: 2FA Manager

          bookmarks: []

        ingress:
          main:
            enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: homepage
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
