# =============================================================================
# Homepage — Helm Application (ArgoCD)
# =============================================================================
# Modern dashboard with Kubernetes service auto-discovery.
# Replaces Homer. Accessible at home.cyphers.app behind authentik.
# =============================================================================
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homepage
  namespace: argocd
  labels:
    tier: tools
spec:
  project: default
  source:
    repoURL: https://jameswynn.github.io/helm-charts
    chart: homepage
    targetRevision: "2.*.*"
    helm:
      releaseName: homepage
      valuesObject:
        image:
          repository: ghcr.io/gethomepage/homepage
          tag: latest

        enableRbac: true

        serviceAccount:
          create: true
          name: homepage

        env:
          HOMEPAGE_ALLOWED_HOSTS: "home.cyphers.app"

        config:
          kubernetes:
            mode: cluster

          settings:
            title: Cyphers Homelab
            favicon: https://cyphers.app/favicon.ico
            headerStyle: clean
            layout:
              - Infrastructure:
                  style: row
                  columns: 4
              - Applications:
                  style: row
                  columns: 4
              - Monitoring:
                  style: row
                  columns: 4

          widgets:
            - kubernetes:
                cluster:
                  show: true
                  cpu: true
                  memory: true
                  showLabel: true
                  label: "k3s"
                nodes:
                  show: true
                  cpu: true
                  memory: true
                  showLabel: true
            - search:
                provider: google
                target: _blank

          services: []

          bookmarks: []

        ingress:
          main:
            enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: homepage
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
