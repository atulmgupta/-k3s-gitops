# =============================================================================
# TeslaSync Dev — Helm Application (ArgoCD)
# =============================================================================
# Dev/staging instance of TeslaSync using TimescaleDB backend.
# Runs alongside production in its own namespace.
# =============================================================================
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: teslasync-dev
  namespace: argocd
  labels:
    tier: apps
spec:
  project: default
  source:
    repoURL: ghcr.io/ev-dev-labs/charts
    chart: teslasync
    targetRevision: "0.33.0-rc.db-refactor-timescaledb-migration-mo-jsonb-at-all.g04b0dd1c"
    helm:
      releaseName: teslasync-dev
      valuesObject:
        replicaCount: 1
        image:
          repository: ghcr.io/ev-dev-labs/teslasync-api
          tag: "0.33.0-rc.db-refactor-timescaledb-migration-mo-jsonb-at-all.g04b0dd1c"

        secrets:
          existingSecret: teslasync-dev

        encryption:
          key: ""

        auth:
          jwtSecret: ""

        config:
          apiEndpoint: http://teslasync-dev-api.teslasync-dev.svc.cluster.local:8080
          webEndpoint: https://teslasync.cyphers.app
          browserApiBase: ""
          logLevel: info
          pollInterval: 30s
          sleepPollMultiplier: 4
          forwardAuthHeader: ""
          googleMaps:
            apiKey: ""
          azureMaps:
            apiKey: ""
          openTelemetry:
            enabled: false
            endpoint: jaeger:4317
            insecure: true
            serviceName: teslasync-dev

        resources:
          requests: { cpu: 100m, memory: 128Mi }
          limits: { cpu: 500m, memory: 512Mi }

        metrics:
          enabled: true
          serviceMonitor:
            enabled: true
            namespace: prometheus
            interval: "30s"
            namespaceSelector:
              matchNames:
                - teslasync-dev

        service:
          port: 8080
          type: ClusterIP

        tesla:
          apiBaseUrl: https://fleet-api.prd.na.vn.cloud.tesla.com
          authUrl: "https://auth.tesla.com"
          timeout: "30s"
          redirectUri: https://teslasync.cyphers.app/api/v1/auth/callback

        retention:
          signalHistoryDays: 15

        gasPrice:
          enabled: true
          pollInterval: 15d

        web:
          enabled: true
          replicaCount: 1
          image:
            repository: ghcr.io/ev-dev-labs/teslasync-web
            tag: "0.33.0-rc.db-refactor-timescaledb-migration-mo-jsonb-at-all.g04b0dd1c"
            pullPolicy: IfNotPresent
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 200m, memory: 128Mi }
          service:
            port: 80
            type: LoadBalancer
            loadBalancerIP: "192.168.68.220"

        commandProxy:
          enabled: true
          image:
            repository: tesla/vehicle-command
            tag: latest
            pullPolicy: IfNotPresent
          secretName: tesla-command-proxy-dev
          resources:
            requests: { cpu: 50m, memory: 32Mi }
            limits: { cpu: 200m, memory: 128Mi }
          service:
            port: 4443
            type: ClusterIP

        fleetTelemetry:
          enabled: false  # don't deploy the server — shares vehicle, can't bind same host
          host: "telemetry.cyphers.app"
          topicBase: "telemetry"
          batchMs: 100
          staleTimeout: "15m"
          fallbackPollInterval: "5m"
          snapshotWriteInterval: "1s"
          cleanupInterval: "2m"
          staleSessionTimeout: "5m"
          external:
            host: "telemetry.cyphers.app"
            port: 4443

        exportWorker:
          enabled: true
          replicaCount: 1
          dbMaxConns: 5
          dbMinConns: 2
          image:
            repository: ghcr.io/ev-dev-labs/teslasync-export-worker
            tag: "0.33.0-rc.db-refactor-timescaledb-migration-mo-jsonb-at-all.g04b0dd1c"
            pullPolicy: IfNotPresent
          resources:
            requests: { cpu: 100m, memory: 64Mi }
            limits: { cpu: 500m, memory: 512Mi }
          service:
            port: 8082
            type: ClusterIP

        notificationWorker:
          enabled: true
          replicaCount: 1
          dbMaxConns: 5
          dbMinConns: 2
          image:
            repository: ghcr.io/ev-dev-labs/teslasync-notification-worker
            tag: "0.33.0-rc.db-refactor-timescaledb-migration-mo-jsonb-at-all.g04b0dd1c"
            pullPolicy: IfNotPresent
          resources:
            requests: { cpu: 50m, memory: 32Mi }
            limits: { cpu: 200m, memory: 128Mi }
          service:
            port: 8081
            type: ClusterIP

        automationWorker:
          enabled: true
          replicaCount: 1
          dbMaxConns: 5
          dbMinConns: 2
          image:
            repository: ghcr.io/ev-dev-labs/teslasync-automation-worker
            tag: "0.33.0-rc.db-refactor-timescaledb-migration-mo-jsonb-at-all.g04b0dd1c"
            pullPolicy: IfNotPresent
          resources:
            requests: { cpu: 100m, memory: 64Mi }
            limits: { cpu: 500m, memory: 256Mi }
          service:
            port: 8083
            type: ClusterIP

        postgresql:
          enabled: false
          maxConns: 25
          minConns: 5
          connectTimeout: 5
          statementTimeout: 30000
          healthCheckPeriod: "5s"
          external:
            host: timescaledb.timescaledb.svc.cluster.local
            port: 5432
            database: teslasync
            username: teslasync
            sslMode: disable

        redis:
          enabled: false
          db: 1  # different db index from production (db: 0)
          external:
            host: redis-master.redis.svc.cluster.local
            port: 6379

        mongodb:
          enabled: false
          database: teslasync_dev
          ttlDays: 7
          external:
            uri: "external"

        mqtt:
          enabled: false
          clientId: "teslasync-dev"
          prefix: "teslasync"
          external:
            host: mqtt-emqx.mqtt.svc.cluster.local
            port: 1883

        grafana:
          enabled: false

        jaeger:
          enabled: false

        ingress:
          enabled: false

        ingressRoute:
          enabled: true
          annotations:
            kubernetes.io/ingress.class: traefik-external
          entryPoints:
            - websecure
          namespace: teslasync-dev
          routes:
            - kind: Rule
              match: "Host(`teslasync.cyphers.app`) && PathPrefix(`/.well-known`)"
              middlewares:
                - name: default-headers
                  namespace: traefik
              services:
                - name: teslasync-dev-web
                  port: 80
            - kind: Rule
              match: "Host(`teslasync.cyphers.app`) && PathPrefix(`/api`)"
              middlewares:
                - name: authentik-auth
                  namespace: authentik
                - name: default-headers
                  namespace: traefik
              services:
                - name: teslasync-dev-api
                  port: 8080
            - kind: Rule
              match: "Host(`teslasync.cyphers.app`)"
              middlewares:
                - name: authentik-auth
                  namespace: authentik
                - name: default-headers
                  namespace: traefik
              services:
                - name: teslasync-dev-web
                  port: 80
          tls:
            enabled: true
            secretName: production-cyphers-app-tls

  destination:
    server: https://kubernetes.default.svc
    namespace: teslasync-dev
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: tesla-command-proxy-dev
      jsonPointers:
        - /data
        - /stringData
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
