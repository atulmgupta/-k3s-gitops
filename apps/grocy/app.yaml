# =============================================================================
# Grocy — Kustomize Application (ArgoCD)
# =============================================================================
# Self-hosted groceries & household management.
# =============================================================================
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grocy
  namespace: argocd
  labels:
    tier: apps
spec:
  project: default
  source:
    repoURL: https://github.com/atulmgupta/-k3s-gitops.git
    targetRevision: main
    path: apps/grocy/resources
    kustomize: {}
  destination:
    server: https://kubernetes.default.svc
    namespace: grocy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
