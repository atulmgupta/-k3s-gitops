apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: gotify
  annotations:
    kubernetes.io/ingress.class: traefik-external
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Gotify"
    gethomepage.dev/group: "Applications"
    gethomepage.dev/icon: "gotify"
    gethomepage.dev/description: "Push Notifications"
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`gotify.cyphers.app`)
      middlewares:
        - name: default-headers
          namespace: traefik
        - name: authentik-auth
          namespace: authentik
      services:
        - name: gotify
          namespace: gotify
          port: 80
  tls:
    secretName: production-cyphers-app-tls
