apiVersion: apps/v1
kind: Deployment
metadata:
  name: twofauth
  labels:
    app.kubernetes.io/name: twofauth
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: twofauth
  template:
    metadata:
      labels:
        app.kubernetes.io/name: twofauth
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: fix-permissions
          image: busybox:latest
          command: ["sh", "-c", "chmod -R 777 /2fauth"]
          volumeMounts:
            - name: data
              mountPath: /2fauth
      containers:
        - name: twofauth
          image: 2fauth/2fauth:latest
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: APP_URL
              value: https://2fauth.cyphers.app
            - name: APP_KEY
              value: "base64:aa9BtIN6DBouOIWvFyxqOudfrvRn36uLiQwqi2fNCO4="
            - name: AUTHENTICATION_GUARD
              value: reverse-proxy-guard
            - name: AUTH_PROXY_HEADER_FOR_USER
              value: X-authentik-username
            - name: AUTH_PROXY_HEADER_FOR_EMAIL
              value: X-authentik-email
            - name: THROTTLE_API
              value: "500"
            - name: TRUSTED_PROXIES
              value: "*"
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /2fauth
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: twofauth-data
