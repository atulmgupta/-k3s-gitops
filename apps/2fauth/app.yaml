# =============================================================================
# 2FAuth — Kustomize Application (ArgoCD)
# =============================================================================
# Web-based self-hosted 2FA/TOTP manager.
# =============================================================================
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: twofauth
  namespace: argocd
  labels:
    tier: apps
spec:
  project: default
  source:
    repoURL: https://github.com/atulmgupta/-k3s-gitops.git
    targetRevision: main
    path: apps/2fauth/resources
    kustomize: {}
  destination:
    server: https://kubernetes.default.svc
    namespace: twofauth
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
