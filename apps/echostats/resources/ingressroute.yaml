apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: echostats
  annotations:
    kubernetes.io/ingress.class: traefik-external
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "EchoStats"
    gethomepage.dev/group: "Applications"
    gethomepage.dev/icon: "mdi-chart-bar"
    gethomepage.dev/description: "Spotify Analytics"
    gethomepage.dev/href: "https://echostats.cyphers.app"
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: "Host(`echostats.cyphers.app`) && PathPrefix(`/api`)"
      middlewares:
        - name: default-headers
          namespace: traefik
      services:
        - name: echostats-api
          namespace: echostats
          port: 8000
    - kind: Rule
      match: Host(`echostats.cyphers.app`)
      middlewares:
        - name: default-headers
          namespace: traefik
        - name: authentik-auth
          namespace: authentik
      services:
        - name: echostats-web
          namespace: echostats
          port: 3000
  tls:
    secretName: production-cyphers-app-tls
