apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: timescaledb
  labels:
    app.kubernetes.io/name: timescaledb
    app.kubernetes.io/instance: timescaledb
spec:
  serviceName: timescaledb-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: timescaledb
      app.kubernetes.io/instance: timescaledb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: timescaledb
        app.kubernetes.io/instance: timescaledb
    spec:
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
      containers:
        - name: timescaledb
          image: timescale/timescaledb-ha:pg17
          imagePullPolicy: IfNotPresent
          args:
            - -c
            - timescaledb.telemetry_level=off
          ports:
            - name: postgresql
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              value: teslasync
            - name: POSTGRES_DB
              value: teslasync
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: timescaledb-secret
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /home/postgres/pgdata/data
          volumeMounts:
            - name: data
              mountPath: /home/postgres/pgdata
            - name: config
              mountPath: /docker-entrypoint-initdb.d/001-init-timescaledb.sql
              subPath: init.sql
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - teslasync
                - -d
                - teslasync
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - teslasync
                - -d
                - teslasync
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
      volumes:
        - name: config
          configMap:
            name: timescaledb-config
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: timescaledb
          app.kubernetes.io/instance: timescaledb
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: longhorn
        resources:
          requests:
            storage: 100Gi
