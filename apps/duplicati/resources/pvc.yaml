apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: duplicati-config
  labels:
    app.kubernetes.io/name: duplicati
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: duplicati-backups
  labels:
    app.kubernetes.io/name: duplicati
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
