---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nut-exporter-resources
  namespace: argocd
  labels:
    tier: monitoring
spec:
  project: default
  source:
    repoURL: https://github.com/atulmgupta/-k3s-gitops.git
    targetRevision: main
    path: apps/nut-exporter/resources
    kustomize: {}
  destination:
    server: https://kubernetes.default.svc
    namespace: nut-exporter
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
