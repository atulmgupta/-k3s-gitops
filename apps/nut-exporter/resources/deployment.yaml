---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nut-exporter
  labels:
    app.kubernetes.io/name: nut-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nut-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nut-exporter
    spec:
      containers:
        - name: nut-exporter
          image: hon95/prometheus-nut-exporter:1.2.6
          env:
            - name: NUT_EXPORTER_SERVER_HOST
              value: "lithium"
            - name: NUT_EXPORTER_SERVER_PORT
              value: "3493"
            - name: HTTP_PORT
              value: "9199"
          ports:
            - name: metrics
              containerPort: 9199
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
      nodeSelector:
        kubernetes.io/os: linux
