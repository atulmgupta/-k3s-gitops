apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: vitasync
  annotations:
    kubernetes.io/ingress.class: traefik-external
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "VitaSync"
    gethomepage.dev/group: "Applications"
    gethomepage.dev/icon: "mdi-heart-pulse"
    gethomepage.dev/description: "Health Sync"
    gethomepage.dev/href: "https://vitasync.cyphers.app"
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: "Host(`vitasync.cyphers.app`) && PathPrefix(`/v1/`)"
      middlewares:
        - name: default-headers
          namespace: traefik
      services:
        - name: vitasync-api
          namespace: vitasync
          port: 3001
    - kind: Rule
      match: Host(`vitasync.cyphers.app`)
      middlewares:
        - name: authentik-auth
          namespace: authentik
        - name: default-headers
          namespace: traefik
      services:
        - name: vitasync-web
          namespace: vitasync
          port: 3000
    - kind: Rule
      match: Host(`vitasync-api.cyphers.app`)
      middlewares:
        - name: authentik-auth
          namespace: authentik
        - name: default-headers
          namespace: traefik
      services:
        - name: vitasync-api
          namespace: vitasync
          port: 3001
  tls:
    secretName: production-cyphers-app-tls
---
# Admin portal — separate subdomain with rate limiting
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: vitasync-admin
  annotations:
    kubernetes.io/ingress.class: traefik-external
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`admin.vitasync.cyphers.app`)
      middlewares:
        - name: default-headers
          namespace: traefik
        - name: authentik-auth
          namespace: authentik
      services:
        - name: vitasync-web
          namespace: vitasync
          port: 3000
  tls:
    secretName: production-cyphers-app-tls
