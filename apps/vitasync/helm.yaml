# =============================================================================
# VitaSync v2 — Helm Application (ArgoCD)
# =============================================================================
# Complete platform overhaul: auth, admin portal, design system.
# Chart 0.4.0+ with admin ingress, SMTP, self-registration.
# =============================================================================
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vitasync
  namespace: argocd
  labels:
    tier: apps
spec:
  project: default
  source:
    repoURL: ghcr.io/biosync-io/charts
    chart: vitasync
    targetRevision: "2.25.0-rc.feature-user-boundaries.2e49b8a"
    helm:
      releaseName: vitasync
      valuesObject:
        api:
          enabled: true
          replicaCount: 1
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 500m, memory: 512Mi }

        web:
          enabled: true
          replicaCount: 1
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 250m, memory: 256Mi }

        worker:
          enabled: true
          replicaCount: 1
          queues: sync,analytics,webhooks
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 500m, memory: 512Mi }

        notificationWorker:
          enabled: true
          replicaCount: 1
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 250m, memory: 256Mi }

        reportWorker:
          enabled: true
          replicaCount: 1
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 500m, memory: 512Mi }

        config:
          NODE_ENV: production
          LOG_LEVEL: info
          HOST: 0.0.0.0
          PORT: "3001"
          DATABASE_POOL_MAX: "20"
          DATABASE_POOL_MIN: "2"
          RATE_LIMIT_MAX: "100"
          RATE_LIMIT_WINDOW_MS: "60000"
          ADMIN_WORKSPACE_SLUG: default
          INTERNAL_API_URL: http://vitasync-api.vitasync.svc.cluster.local:3001
          OAUTH_REDIRECT_BASE_URL: https://vitasync.cyphers.app
          NEXT_PUBLIC_API_URL: https://api.vitasync.cyphers.app

        externalPostgresql:
          host: postgres-v17-postgresql.postgres-v17.svc.cluster.local
          port: 5432
          database: vitasync
          username: vitasync
          password: ""

        externalRedis:
          host: redis-master.redis.svc.cluster.local
          port: 6379
          password: ""

        postgresql:
          enabled: false
        redis:
          enabled: false

        secrets:
          existingSecret: vitasync-secrets
          ALLOW_SELF_REGISTRATION: "false"

        ingress:
          enabled: false
          admin:
            enabled: true
            host: admin.vitasync.cyphers.app
            rateLimit:
              enabled: true
              average: 30
              burst: 50
              period: "1m"

        ingressRoute:
          enabled: false

        migrations:
          enabled: true

  destination:
    server: https://kubernetes.default.svc
    namespace: vitasync
  ignoreDifferences:
    - group: ""
      kind: Secret
      jsonPointers:
        - /data
        - /stringData
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
