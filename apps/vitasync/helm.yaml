# =============================================================================
# VitaSync — Helm Application (ArgoCD)
# =============================================================================
# Health data sync platform. Chart sourced from app's git repo.
# Secrets managed via SOPS-encrypted K8s Secret.
# =============================================================================
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vitasync
  namespace: argocd
  labels:
    tier: apps
spec:
  project: default
  source:
    repoURL: https://github.com/biosync-io/vitasync.git
    targetRevision: main
    path: helm/vitasync
    helm:
      releaseName: vitasync
      valuesObject:
        config:
          NODE_ENV: production
          LOG_LEVEL: info
          HOST: 0.0.0.0
          PORT: "3001"
          DATABASE_POOL_MAX: "20"
          DATABASE_POOL_MIN: "2"
          RATE_LIMIT_MAX: "100"
          RATE_LIMIT_WINDOW_MS: "60000"
          ADMIN_WORKSPACE_SLUG: default
          INTERNAL_API_URL: http://vitasync-api.vitasync.svc.cluster.local:3001
          OAUTH_REDIRECT_BASE_URL: https://vitasync.cyphers.app

        externalPostgresql:
          host: postgres-v17-postgresql.postgres-v17.svc.cluster.local
          port: 5432
          database: vitasync
          username: vitasync
          existingSecret: vitasync-credentials
          existingSecretKey: DATABASE_PASSWORD

        externalRedis:
          host: redis-master.redis.svc.cluster.local
          port: 6379
          existingSecret: vitasync-credentials
          existingSecretKey: REDIS_PASSWORD

        postgresql:
          enabled: false
        redis:
          enabled: false

        secrets:
          existingSecret: vitasync-credentials

        ingressRoute:
          enabled: false

        migrations:
          enabled: true

        api:
          enabled: true
          replicaCount: 1
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 500m, memory: 512Mi }

        web:
          enabled: true
          replicaCount: 1
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 250m, memory: 256Mi }

        worker:
          enabled: true
          replicaCount: 1
          queues: sync,analytics,webhooks
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 500m, memory: 512Mi }

        notificationWorker:
          enabled: true
          replicaCount: 1
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 250m, memory: 256Mi }

        reportWorker:
          enabled: true
          replicaCount: 1
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 500m, memory: 512Mi }

        ingress:
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: vitasync
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
