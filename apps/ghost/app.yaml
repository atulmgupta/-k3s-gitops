# =============================================================================
# Ghost — Helm Application (ArgoCD)
# =============================================================================
# Ghost blogging platform (Bitnami chart) with bundled MySQL.
# Persistent storage on Longhorn.
# =============================================================================
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ghost
  namespace: argocd
  labels:
    tier: apps
spec:
  project: default
  source:
    repoURL: oci://registry-1.docker.io/bitnamicharts
    chart: ghost
    targetRevision: "21.*.*"
    helm:
      valuesObject:
        persistence:
          enabled: true
          size: 8Gi
          storageClass: longhorn

        mysql:
          primary:
            persistence:
              enabled: true
              size: 8Gi
              storageClass: longhorn

        ingress:
          enabled: false

        service:
          type: LoadBalancer

        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: ghost
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
