apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: headlamp
  annotations:
    kubernetes.io/ingress.class: traefik-external
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Headlamp"
    gethomepage.dev/group: "Monitoring"
    gethomepage.dev/icon: "kubernetes-dashboard"
    gethomepage.dev/description: "Kubernetes Dashboard"
    gethomepage.dev/href: "https://k8s.cyphers.app"
spec:
  entryPoints:
    - websecure
  routes:
    # OIDC endpoints must bypass forward-auth (Headlamp handles its own OIDC)
    - kind: Rule
      match: Host(`k8s.cyphers.app`) && (Path(`/oidc`) || Path(`/oidc-callback`))
      middlewares:
        - name: default-headers
          namespace: traefik
      services:
        - name: headlamp
          namespace: headlamp
          port: 80
    # All other routes use forward-auth
    - kind: Rule
      match: Host(`k8s.cyphers.app`)
      middlewares:
        - name: default-headers
          namespace: traefik
        - name: authentik-auth
          namespace: authentik
      services:
        - name: headlamp
          namespace: headlamp
          port: 80
  tls:
    secretName: production-cyphers-app-tls
