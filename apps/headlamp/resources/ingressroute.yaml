apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: headlamp
  annotations:
    kubernetes.io/ingress.class: traefik-external
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`k8s.cyphers.app`)
      middlewares:
        - name: default-headers
          namespace: traefik
        - name: authentik-auth
          namespace: authentik
      services:
        - name: headlamp
          namespace: headlamp
          port: 80
  tls:
    secretName: production-cyphers-app-tls
