# =============================================================================
# Headlamp — Helm Application (ArgoCD)
# =============================================================================
# Modern Kubernetes dashboard (CNCF sandbox).
# Secured behind authentik ForwardAuth at k8s.cyphers.app.
# Uses SA token for K8s API access (set via initContainer).
# =============================================================================
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: headlamp
  namespace: argocd
  labels:
    tier: tools
spec:
  project: default
  source:
    repoURL: https://kubernetes-sigs.github.io/headlamp/
    chart: headlamp
    targetRevision: "0.*.*"
    helm:
      releaseName: headlamp
      valuesObject:
        config:
          oidc:
            secret:
              create: false
              name: oidc

        env:
          - name: OIDC_CLIENT_ID
            valueFrom:
              secretKeyRef:
                name: oidc
                key: OIDC_CLIENT_ID
          - name: OIDC_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: oidc
                key: OIDC_CLIENT_SECRET
          - name: OIDC_ISSUER_URL
            valueFrom:
              secretKeyRef:
                name: oidc
                key: OIDC_ISSUER_URL
          - name: OIDC_SCOPES
            valueFrom:
              secretKeyRef:
                name: oidc
                key: OIDC_SCOPES

        clusterRoleBinding:
          create: true

        service:
          type: ClusterIP
          port: 80

        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: headlamp
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jqPathExpressions:
        - .spec.template
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - Replace=true

