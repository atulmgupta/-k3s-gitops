# =============================================================================
# Headlamp — Resources (IngressRoute behind authentik)
# =============================================================================
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: headlamp-resources
  namespace: argocd
  labels:
    tier: tools
spec:
  project: default
  source:
    repoURL: https://github.com/atulmgupta/-k3s-gitops.git
    targetRevision: main
    path: apps/headlamp/resources
    kustomize: {}
  destination:
    server: https://kubernetes.default.svc
    namespace: headlamp
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
