# =============================================================================
# Kubernetes Dashboard — Helm Application (ArgoCD)
# =============================================================================
# Official k8s dashboard with Kong API gateway proxy.
# =============================================================================
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k8s-dashboard
  namespace: argocd
  labels:
    tier: tools
spec:
  project: default
  source:
    repoURL: https://kubernetes.github.io/dashboard/
    chart: kubernetes-dashboard
    targetRevision: "7.*.*"
    helm:
      releaseName: k8s-dashboard
      valuesObject:
        kong:
          proxy:
            type: LoadBalancer
        protocolHttp: true
  destination:
    server: https://kubernetes.default.svc
    namespace: kubernetes-dashboard
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
