---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: grafana
  annotations:
    kubernetes.io/ingress.class: traefik-external
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`grafana.cyphers.app`)
      middlewares:
        - name: authelia-auth
          namespace: authelia
        - name: default-headers
          namespace: traefik
      services:
        - name: grafana
          port: 3000
  tls:
    secretName: production-cyphers-app-tls
