              "editorMode": "code",
              "format": "table",
              "rawQuery": true,
              "rawSql": "SELECT\n  CASE\n    WHEN a.display_name LIKE '%Home%' THEN '🏠'\n    WHEN a.display_name LIKE '%Office%' THEN '🏢'\n    WHEN a.display_name LIKE '%Supercharger%' THEN '⚡'\n    WHEN a.display_name LIKE '%Hotel%' THEN '🏨'\n    WHEN a.display_name LIKE '%Resort%' THEN '🏖️'\n    WHEN a.display_name LIKE '%Costco%' OR a.display_name LIKE '%Walmart%' THEN '🛒'\n    WHEN a.display_name LIKE '%Service%' THEN '🔧'\n    ELSE '📍'\n  END || ' ' || COALESCE(a.display_name, 'Unknown') AS \"📍 Location\",\n  COALESCE('-', '') AS \"🏙️ City\",\n  COALESCE(a.state, '') AS \"🗺️ State\",\n  COALESCE(a.country, '') AS \"🌍 Country\",\n  vl.visit_count AS \"🔄 Visits\",\n  ROUND(vl.total_duration_min / 60) AS \"⏱️ Hours\",\n  TO_CHAR(vl.last_visited, 'YYYY-MM-DD') AS \"📅 Last Visit\"\nFROM visited_locations vl\nJOIN addresses a ON vl.address_id = a.id\nWHERE vl.vehicle_id = ${vehicle_id}\nORDER BY vl.visit_count DESC\nLIMIT 30",
              "refId": "A"
            }
