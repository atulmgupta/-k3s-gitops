              "rawQuery": true,
              "rawSql": "SELECT\n  cs.start_ts AS \"📅 Date\",\n  COALESCE(cs.charger_location, '-') AS \"📍 Location\",\n  ROUND(cs.energy_added_kwh::numeric, 1) AS \"⚡ kWh Added\",\n  ROUND(cs.cost::numeric, 2) AS \"💰 Cost\",\n  cs.start_battery_pct AS \"🔋 Start %\",\n  cs.end_battery_pct AS \"🔋 End %\",\n  ROUND(cs.charger_power_kw_max::numeric) AS \"🔌 Power\",\n  COALESCE(cs.charger_type, 'AC') AS \"🏷️ Type\",\n  COALESCE(cs.charger_type, '-') AS \"🏷️ Brand\",\n  ROUND(cs.duration_min::numeric) AS \"⏱️ Duration\"\nFROM charging_sessions cs\nWHERE cs.vehicle_id = ${vehicle_id}\n  AND $__timeFilter(cs.start_ts)\nORDER BY cs.start_ts DESC\nLIMIT 200",
              "refId": "A"
            }
          ],
