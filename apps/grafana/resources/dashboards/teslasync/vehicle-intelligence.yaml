              "rawQuery": true,
              "rawSql": "SELECT\n  $__timeGroup(created_at, '1m') AS time,\n  MAX(CASE WHEN value_bool THEN 1 ELSE 0 END) FILTER (WHERE signal = 'LightsHazardsActive') AS \"Hazards Active\",\n  MAX(CASE WHEN value_bool THEN 1 ELSE 0 END) FILTER (WHERE signal = 'LightsHighBeams') AS \"High Beams\"\nFROM signal_log\nWHERE vehicle_id = ${vehicle_id}\n  AND signal IN ('LightsHazardsActive', 'LightsHighBeams')\n  AND created_at BETWEEN $__timeFrom() AND $__timeTo()\nGROUP BY 1\nORDER BY 1",
