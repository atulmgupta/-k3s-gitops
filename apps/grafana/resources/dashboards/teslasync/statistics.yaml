            {
              "datasource": {
                "type": "grafana-postgresql-datasource",
                "uid": "DS_TESLASYNC_POSTGRESQL"
              },
              "editorMode": "code",
              "format": "table",
              "rawQuery": true,
              "rawSql": "WITH monthly_drives AS (\n  SELECT\n    DATE_TRUNC('month', d.start_date) AS month,\n    d.vehicle_id,\n    COUNT(*) AS drives,\n    ROUND(convert_distance(SUM(d.distance))::numeric, 1) AS distance_km,\n    ROUND(SUM(d.duration_min)::numeric) AS duration_min,\n    ROUND(convert_speed(SUM(d.distance) / NULLIF(SUM(d.duration_min), 0) * 60)::numeric, 1) AS avg_speed,\n    ROUND(convert_speed(MAX(d.speed_max))::numeric) AS top_speed\n  FROM v_drives d\n  WHERE d.vehicle_id = ${vehicle_id}\n  GROUP BY DATE_TRUNC('month', d.start_date), d.vehicle_id\n),\nmonthly_charges AS (\n  SELECT\n    DATE_TRUNC('month', cs.start_date) AS month,\n    cs.vehicle_id,\n    COUNT(*) AS charges,\n    ROUND(SUM(cs.charge_energy_added)::numeric, 1) AS energy_kwh,\n    ROUND(SUM(CASE WHEN cs.cost IS NOT NULL THEN cs.cost END)::numeric, 2) AS cost\n  FROM v_charging_sessions cs\n  WHERE cs.vehicle_id = ${vehicle_id}\n  GROUP BY DATE_TRUNC('month', cs.start_date), cs.vehicle_id\n)\nSELECT\n  TO_CHAR(md.month, 'YYYY-MM') AS \"📅 Month\",\n  md.drives AS \"🛣️ Drives\",\n  md.distance_km AS \"📏 Distance\",\n  md.duration_min AS \"⏱️ Duration\",\n  md.avg_speed AS \"🚗 Avg Speed\",\n  md.top_speed AS \"🏎️ Top Speed\",\n  COALESCE(mc.charges, 0) AS \"⚡ Charges\",\n  mc.energy_kwh AS \"⚡ Energy\",\n  mc.cost AS \"💰 Cost\"\nFROM monthly_drives md\nLEFT JOIN monthly_charges mc ON mc.month = md.month AND mc.vehicle_id = md.vehicle_id\nORDER BY md.month DESC",
              "refId": "A"
            }
          ],
          "title": "Monthly Statistics",
          "type": "table",
          "transparent": false
        }
