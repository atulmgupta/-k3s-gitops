          "targets": [
            {
              "datasource": {
                "type": "grafana-postgresql-datasource",
                "uid": "DS_TESLASYNC_POSTGRESQL"
              },
              "editorMode": "code",
              "format": "table",
              "rawQuery": true,
              "rawSql": "WITH latest AS (\n  SELECT brick_voltage_max, brick_voltage_min, pack_voltage,\n         COALESCE(num_brick_voltage_max, 0) AS max_idx,\n         COALESCE(num_brick_voltage_min, 0) AS min_idx\n  FROM charging_telemetry\n  WHERE vehicle_id = ${vehicle_id}\n    AND brick_voltage_max IS NOT NULL\n    AND brick_voltage_min IS NOT NULL\n  ORDER BY created_at DESC\n  LIMIT 1\n),\nparams AS (\n  SELECT\n    brick_voltage_max AS v_max,\n    brick_voltage_min AS v_min,\n    (brick_voltage_max + brick_voltage_min) / 2.0 AS v_avg,\n    brick_voltage_max - brick_voltage_min AS spread,\n    max_idx, min_idx,\n    CASE\n      WHEN pack_voltage > 0\n           AND (brick_voltage_max + brick_voltage_min) / 2.0 > 0\n           AND ROUND(pack_voltage / ((brick_voltage_max + brick_voltage_min) / 2.0)) BETWEEN 72 AND 110\n      THEN ROUND(pack_voltage / ((brick_voltage_max + brick_voltage_min) / 2.0))::int\n      ELSE 96\n    END AS total\n  FROM latest\n)\nSELECT\n  g.n AS \"Cell\",\n  ROUND(\n    CASE\n      WHEN g.n - 1 = p.min_idx THEN p.v_min\n      WHEN g.n - 1 = p.max_idx THEN p.v_max\n      ELSE p.v_avg + (p.v_min + (g.n - 1)::float / GREATEST(p.total - 1, 1)::float * p.spread - p.v_avg) * 0.6\n    END::numeric, 4\n  ) AS \"Voltage (V)\",\n  ROUND(\n    (CASE\n      WHEN g.n - 1 = p.min_idx THEN p.v_min\n      WHEN g.n - 1 = p.max_idx THEN p.v_max\n      ELSE p.v_avg + (p.v_min + (g.n - 1)::float / GREATEST(p.total - 1, 1)::float * p.spread - p.v_avg) * 0.6\n    END - p.v_avg)::numeric, 4\n  ) AS \"Deviation\"\nFROM params p\nCROSS JOIN LATERAL generate_series(1, p.total) AS g(n)\nORDER BY g.n",
              "refId": "A"
            }
          ],
