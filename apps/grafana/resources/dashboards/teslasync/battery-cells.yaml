              "rawQuery": true,
              "rawSql": "WITH latest AS (\n  SELECT cell_id, voltage, temperature\n  FROM battery_cells\n  WHERE vehicle_id = ${vehicle_id}\n    AND created_at = (\n      SELECT MAX(created_at) FROM battery_cells WHERE vehicle_id = ${vehicle_id}\n    )\n),\nstats AS (\n  SELECT AVG(voltage) AS avg_v, AVG(temperature) AS avg_t FROM latest\n)\nSELECT\n  l.cell_id AS \"Cell\",\n  ROUND(l.voltage::numeric, 4) AS \"Voltage (V)\",\n  ROUND(l.temperature::numeric, 1) AS \"Temp (°C)\",\n  ROUND((l.voltage - s.avg_v)::numeric, 4) AS \"V Deviation\",\n  ROUND((l.temperature - s.avg_t)::numeric, 1) AS \"T Deviation\"\nFROM latest l, stats s\nORDER BY l.cell_id",
              "refId": "A"
