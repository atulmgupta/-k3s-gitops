              "rawQuery": true,
              "rawSql": "SELECT\n  v.display_name AS \"🚗 Vehicle\",\n  v.model AS \"🚗 Model\",\n  v.state AS \"📊 State\",\n  (SELECT ROUND(convert_distance(p.odometer)::numeric, 1) FROM positions p WHERE p.vehicle_id = v.id ORDER BY p.created_at DESC LIMIT 1) AS \"📏 Odometer\",\n  (SELECT p.battery_level FROM positions p WHERE p.vehicle_id = v.id ORDER BY p.created_at DESC LIMIT 1) AS \"🔋 Battery %\",\n  (SELECT COUNT(*) FROM drives d WHERE d.vehicle_id = v.id) AS \"🛣️ Total Drives\",\n  (SELECT ROUND(convert_distance(SUM(d2.distance))::numeric, 1) FROM drives d2 WHERE d2.vehicle_id = v.id) AS \"📏 Total Dist\",\n  (SELECT COUNT(*) FROM charging_sessions cs WHERE cs.vehicle_id = v.id) AS \"⚡ Charges\",\n  (SELECT ROUND(SUM(cs2.charge_energy_added)::numeric, 1) FROM charging_sessions cs2 WHERE cs2.vehicle_id = v.id) AS \"⚡ Total kWh\",\n  (SELECT su.version FROM software_updates su WHERE su.vehicle_id = v.id AND su.status = 'installed' ORDER BY su.installed_at DESC LIMIT 1) AS \"📦 Version\"\nFROM vehicles v\nORDER BY v.display_name",
