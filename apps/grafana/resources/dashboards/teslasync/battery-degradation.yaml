            {
              "datasource": {
                "type": "grafana-postgresql-datasource",
                "uid": "DS_TESLASYNC_POSTGRESQL"
              },
              "editorMode": "code",
              "format": "time_series",
              "rawQuery": true,
              "rawSql": "SELECT\n  created_at AS time,\n  capacity_kwh AS \"Estimated Capacity kWh\",\n  75.0 AS \"Original Capacity kWh\"\nFROM battery_snapshots\nWHERE vehicle_id = ${vehicle_id}\n  AND $__timeFilter(created_at)\nORDER BY created_at",
              "refId": "A"
            }
          ],
          "title": "Capacity Over Time",
          "type": "timeseries",
          "transparent": false
        },
        {
          "datasource": {
            "type": "grafana-postgresql-datasource",
            "uid": "DS_TESLASYNC_POSTGRESQL"
          },
          "description": "Total estimated charge cycles. Computed from cumulative energy charged divided by usable capacity.",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 500
                  },
                  {
                    "color": "red",
                    "value": 1000
                  }
                ]
              },
              "unit": "none",
              "decimals": 0
            },
            "overrides": []
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 6,
            "y": 20
          },
          "id": 2,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": {
                "type": "grafana-postgresql-datasource",
                "uid": "DS_TESLASYNC_POSTGRESQL"
              },
              "editorMode": "code",
              "format": "table",
              "rawQuery": true,
              "rawSql": "SELECT\n  COALESCE(\n    (SELECT cycle_count FROM battery_snapshots\n     WHERE vehicle_id = ${vehicle_id}\n     ORDER BY created_at DESC LIMIT 1),\n    (SELECT FLOOR(SUM(GREATEST(end_battery_level - start_battery_level, 0)) / 100)\n     FROM charging_sessions\n     WHERE vehicle_id = ${vehicle_id}\n       AND end_battery_level > start_battery_level),\n    0\n  ) AS \"Cycles\"",
              "refId": "A"
            }
          ],
          "title": "Charge Cycle Count",
          "type": "stat",
          "transparent": false
        },
        {
          "datasource": {
            "type": "grafana-postgresql-datasource",
            "uid": "DS_TESLASYNC_POSTGRESQL"
          },
          "description": "Estimated annual battery degradation rate calculated from the SoH trend slope.",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 2
                  },
                  {
                    "color": "red",
                    "value": 5
                  }
                ]
              },
              "unit": "percent",
              "decimals": 2
            },
            "overrides": []
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 20
          },
          "id": 3,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "text": {
              "titleSize": 14,
              "valueSize": 32
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": {
                "type": "grafana-postgresql-datasource",
                "uid": "DS_TESLASYNC_POSTGRESQL"
              },
              "editorMode": "code",
              "format": "table",
              "rawQuery": true,
              "rawSql": "SELECT\n  ROUND(\n    (MAX(health_score) - MIN(health_score)) /\n    NULLIF(EXTRACT(EPOCH FROM MAX(created_at) - MIN(created_at)) / (365.25 * 86400), 0)\n  , 2) AS \"Degradation %/yr\"\nFROM battery_snapshots\nWHERE vehicle_id = ${vehicle_id}\n  AND health_score IS NOT NULL",
              "refId": "A"
            }
          ],
          "title": "Annual Degradation Rate",
          "type": "stat",
          "transparent": false
        },
        {
          "datasource": {
            "type": "grafana-postgresql-datasource",
            "uid": "DS_TESLASYNC_POSTGRESQL"
          },
          "description": "Shows risk factors that accelerate degradation: fast-charge ratio, high-SoC charging frequency, temperature exposure score, deep discharge frequency. Each scored 0–100.",
