              "editorMode": "code",
              "format": "table",
              "rawQuery": true,
              "rawSql": "WITH daily_cap AS (SELECT time_bucket('1 day', created_at) AS day, AVG(value_num) FILTER (WHERE signal = 'EnergyRemaining') / NULLIF(AVG(value_num) FILTER (WHERE signal = 'BatteryLevel'), 0) * 100 AS est_cap FROM signal_log WHERE vehicle_id = ${vehicle_id} AND signal IN ('EnergyRemaining', 'BatteryLevel') AND created_at BETWEEN $__timeFrom() AND $__timeTo() AND value_num > 0 GROUP BY 1 HAVING AVG(value_num) FILTER (WHERE signal = 'BatteryLevel') > 0), regression AS (SELECT regr_slope(est_cap, EXTRACT(EPOCH FROM day)) AS slope_per_sec, AVG(est_cap) AS avg_cap FROM daily_cap WHERE est_cap IS NOT NULL) SELECT ABS(slope_per_sec * 86400 * 365 / NULLIF(avg_cap, 0) * 100) AS \"Annual Degradation %\" FROM regression",
