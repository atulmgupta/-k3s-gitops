          "targets": [
            {
              "datasource": {
                "type": "grafana-postgresql-datasource",
                "uid": "DS_TESLASYNC_POSTGRESQL"
              },
              "editorMode": "code",
              "format": "table",
              "rawQuery": true,
              "rawSql": "WITH current_daily AS (\n  SELECT\n    ROW_NUMBER() OVER (ORDER BY DATE_TRUNC('day', start_date)) AS day_num,\n    DATE_TRUNC('day', start_date) AS day,\n    SUM(distance) AS dist\n  FROM drives\n  WHERE vehicle_id = ${vehicle_id} AND $__timeFilter(start_date)\n  GROUP BY DATE_TRUNC('day', start_date)\n),\nprior_daily AS (\n  SELECT\n    ROW_NUMBER() OVER (ORDER BY DATE_TRUNC('day', start_date)) AS day_num,\n    DATE_TRUNC('day', start_date) AS day,\n    SUM(distance) AS dist\n  FROM drives\n  WHERE vehicle_id = ${vehicle_id}\n    AND start_date >= $__timeFrom()::timestamp - ($__timeTo()::timestamp - $__timeFrom()::timestamp)\n    AND start_date < $__timeFrom()::timestamp\n  GROUP BY DATE_TRUNC('day', start_date)\n)\nSELECT\n  c.day AS time,\n  ROUND(c.dist::numeric, 1) AS \"Current Period\",\n  ROUND(p.dist::numeric, 1) AS \"Prior Period\"\nFROM current_daily c\nLEFT JOIN prior_daily p ON c.day_num = p.day_num\nORDER BY c.day",
              "refId": "A"
            }
          ],
