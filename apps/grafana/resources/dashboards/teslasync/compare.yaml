              "rawSql": "WITH cmp AS (\n  SELECT * FROM fn_compare_periods(${vehicle_id}::bigint, $__timeFrom()::timestamptz, $__timeTo()::timestamptz)\n)\nSELECT\n  CASE WHEN p.distance > 0\n    THEN ROUND(100.0 * (c.distance - p.distance) / p.distance, 1)\n    ELSE NULL\n  END AS \"Distance Δ%\"\nFROM (SELECT distance FROM cmp WHERE period = 'Current') c,\n     (SELECT distance FROM cmp WHERE period = 'Prior') p",
