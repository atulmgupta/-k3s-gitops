              "rawSql": "WITH cmp AS (\n  SELECT * FROM fn_compare_periods(${vehicle_id}::bigint, $__timeFrom()::timestamptz, $__timeTo()::timestamptz)\n)\nSELECT\n  CASE WHEN p.distance > 0 AND c.distance > 0\n    THEN ROUND(100.0 * ((c.energy / c.distance) - (p.energy / p.distance)) / (p.energy / p.distance), 1)\n    ELSE NULL\n  END AS \"Efficiency Δ%\"\nFROM (SELECT distance, energy FROM cmp WHERE period = 'Current') c,\n     (SELECT distance, energy FROM cmp WHERE period = 'Prior') p",
