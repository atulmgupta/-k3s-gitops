            {
              "datasource": {
                "type": "grafana-postgresql-datasource",
                "uid": "DS_TESLASYNC_POSTGRESQL"
              },
              "editorMode": "code",
              "format": "time_series",
              "rawQuery": true,
              "rawSql": "WITH scored AS (\n  SELECT\n    d.start_date AS time,\n    CASE WHEN d.distance > 0.5\n              AND COALESCE(d.soc_start, 0) > COALESCE(d.soc_end, 0)\n      THEN (COALESCE(d.soc_start, 0) - COALESCE(d.soc_end, 0)) * 750.0 / d.distance\n      ELSE NULL\n    END AS eff\n  FROM drives d\n  WHERE d.vehicle_id = ${vehicle_id}\n    AND $__timeFilter(d.start_date)\n    AND d.distance > 0.5\n  ORDER BY d.start_date\n),\nbest AS (\n  SELECT MIN(eff) AS best_eff FROM scored WHERE eff > 0\n),\nwith_score AS (\n  SELECT\n    s.time,\n    CASE WHEN s.eff > 0 AND b.best_eff > 0\n      THEN LEAST(100, ROUND((b.best_eff / s.eff * 100)::numeric))::int\n      ELSE NULL\n    END AS score\n  FROM scored s\n  CROSS JOIN best b\n)\nSELECT\n  time,\n  score AS \"Score\",\n  ROUND(AVG(score) OVER (ORDER BY time ROWS BETWEEN 6 PRECEDING AND CURRENT ROW))::int AS \"7-Drive Avg\"\nFROM with_score\nORDER BY time",
