          "targets": [
            {
              "datasource": {
                "type": "grafana-postgresql-datasource",
                "uid": "DS_TESLASYNC_POSTGRESQL"
              },
              "editorMode": "code",
              "format": "table",
              "rawQuery": true,
              "rawSql": "WITH raw AS (\n  SELECT\n    d.start_date,\n    d.distance,\n    d.speed_avg,\n    CASE WHEN d.distance > 0.5\n              AND COALESCE(d.soc_start, 0) > COALESCE(d.soc_end, 0)\n      THEN (COALESCE(d.soc_start, 0) - COALESCE(d.soc_end, 0)) * 750.0 / d.distance\n      ELSE NULL\n    END AS eff\n  FROM drives d\n  WHERE d.vehicle_id = ${vehicle_id}\n    AND $__timeFilter(d.start_date)\n    AND d.distance > 0.5\n  ORDER BY d.start_date DESC\n  LIMIT 30\n),\nbest AS (\n  SELECT MIN(eff) AS best_eff FROM raw WHERE eff > 0\n)\nSELECT\n  r.start_date AS \"📅 Date\",\n  ROUND(convert_distance(r.distance, '${unit_length}')::numeric, 1) AS \"📏 Distance\",\n  ROUND(convert_speed(COALESCE(r.speed_avg, 0), '${unit_length}')::numeric, 1) AS \"🚗 Avg Speed\",\n  COALESCE(\n    CASE WHEN r.eff > 0 AND b.best_eff > 0\n      THEN LEAST(100, ROUND((b.best_eff / r.eff * 100)::numeric))::int\n      ELSE 0\n    END, 0\n  ) AS \"⭐ Score\",\n  CASE\n    WHEN r.eff > 0 AND b.best_eff > 0 THEN\n      CASE\n        WHEN LEAST(100, b.best_eff / r.eff * 100) >= 90 THEN '\uD83C\uDD70 A'\n        WHEN LEAST(100, b.best_eff / r.eff * 100) >= 80 THEN '\uD83C\uDD71 B'\n        WHEN LEAST(100, b.best_eff / r.eff * 100) >= 70 THEN 'C'\n        WHEN LEAST(100, b.best_eff / r.eff * 100) >= 60 THEN 'D'\n        ELSE 'F'\n      END\n    ELSE 'F'\n  END AS \"🏅 Grade\",\n  CASE WHEN r.eff IS NOT NULL\n    THEN ROUND(convert_efficiency(r.eff, '${unit_length}')::numeric, 0)\n    ELSE NULL\n  END AS \"⚡ Efficiency\"\nFROM raw r\nCROSS JOIN best b\nORDER BY r.start_date DESC",
