          "description": "Distribution of longitudinal acceleration values across all drives.\nComputed from consecutive speed readings in drive telemetry.\nTaller bars at higher absolute g values indicate more aggressive driving.\nGreen = mild (< 0.2g), yellow = moderate, red = aggressive (> 0.3g).",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "custom": {
                "fillOpacity": 80,
                "gradientMode": "scheme",
                "lineWidth": 1
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": -0.5
                  },
                  {
                    "color": "yellow",
                    "value": -0.3
                  },
                  {
                    "color": "green",
                    "value": -0.2
                  },
