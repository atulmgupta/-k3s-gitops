              "format": "table",
              "rawQuery": true,
              "rawSql": "SELECT * FROM fn_driving_acceleration_distribution(${vehicle_id}::bigint, $__timeFrom()::timestamptz, $__timeTo()::timestamptz)",
              "refId": "A"
            }
          ],
          "title": "Acceleration Distribution",
          "type": "histogram",
          "transparent": false
        },
        {
          "datasource": {
            "type": "grafana-postgresql-datasource",
            "uid": "DS_TESLASYNC_POSTGRESQL"
          },
          "description": "Summary statistics for acceleration across all drives in the selected time range.\nShows mean, standard deviation, and percentile values to quantify driving aggressiveness.",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 0.15
                  },
                  {
                    "color": "red",
                    "value": 0.25
                  }
                ]
              },
              "unit": "accG"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 10,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "id": 2,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "horizontal",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": {
                "type": "grafana-postgresql-datasource",
                "uid": "DS_TESLASYNC_POSTGRESQL"
              },
              "editorMode": "code",
              "format": "table",
              "rawQuery": true,
              "rawSql": "WITH readings AS (\n  SELECT\n    dtr.speed,\n    dtr.created_at,\n    LAG(dtr.speed)      OVER (PARTITION BY dtr.drive_id ORDER BY dtr.created_at) AS prev_speed,\n    LAG(dtr.created_at) OVER (PARTITION BY dtr.drive_id ORDER BY dtr.created_at) AS prev_time\n  FROM drive_telemetry_readings dtr\n  JOIN drives d ON d.id = dtr.drive_id\n  WHERE d.vehicle_id = ${vehicle_id}\n    AND $__timeFilter(d.start_date)\n    AND dtr.speed IS NOT NULL\n),\naccel AS (\n  SELECT\n    ((speed - prev_speed) * 0.44704)\n    / NULLIF(EXTRACT(EPOCH FROM (created_at - prev_time)), 0)\n    / 9.81 AS g\n  FROM readings\n  WHERE prev_speed IS NOT NULL\n    AND prev_time IS NOT NULL\n    AND EXTRACT(EPOCH FROM (created_at - prev_time)) BETWEEN 1 AND 30\n    AND ABS(\n      ((speed - prev_speed) * 0.44704)\n      / NULLIF(EXTRACT(EPOCH FROM (created_at - prev_time)), 0)\n      / 9.81\n    ) <= 0.5\n)\nSELECT\n  ROUND(AVG(ABS(g))::numeric, 3) AS \"Mean |g|\",\n  ROUND(STDDEV(g)::numeric, 3) AS \"Std Dev (g)\",\n  ROUND(PERCENTILE_CONT(0.95) WITHIN GROUP (ORDER BY ABS(g))::numeric, 3) AS \"P95 |g|\",\n  ROUND(MAX(ABS(g))::numeric, 3) AS \"Peak |g|\",\n  COUNT(*) AS \"Samples\"\nFROM accel",
              "refId": "A"
            }
          ],
          "title": "Acceleration Statistics",
          "type": "stat",
          "transparent": false
        },
