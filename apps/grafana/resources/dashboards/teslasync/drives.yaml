              "editorMode": "code",
              "format": "table",
              "rawQuery": true,
              "rawSql": "SELECT\n  d.id AS \"🔗 ID\",\n  d.start_date AS \"📅 Date\",\n  CASE\n    WHEN d.distance > 100 THEN '🛣️ Road Trip'\n    WHEN d.distance > 30 THEN '🚗 Drive'\n    WHEN d.distance > 0 THEN '🏙️ Short'\n    ELSE '🅿️ Parked'\n  END AS \"🏷️ Type\",\n  ROUND(convert_distance(d.distance)::numeric, 1) AS \"📏 Distance\",\n  ROUND(d.duration_min::numeric) AS \"⏱️ Duration\",\n  ROUND(convert_speed(d.distance / NULLIF(d.duration_min, 0) * 60)::numeric, 1) AS \"🚗 Avg Speed\",\n  ROUND(convert_speed(d.speed_max)::numeric) AS \"🏎️ Max Speed\",\n  CASE\n    WHEN d.speed_max > 130 THEN '🔴'\n    WHEN d.speed_max > 100 THEN '🟡'\n    ELSE '🟢'\n  END AS \"🚦 Speed\",\n  d.start_battery_level AS \"🔋 Start %\",\n  d.end_battery_level AS \"🔋 End %\",\n  CASE\n    WHEN (d.start_battery_level - COALESCE(d.end_battery_level, d.start_battery_level)) > 20 THEN '⚠️ High'\n    WHEN (d.start_battery_level - COALESCE(d.end_battery_level, d.start_battery_level)) > 10 THEN '📊 Medium'\n    ELSE '✅ Low'\n  END AS \"📊 Usage\",\n  ROUND(convert_distance(d.start_range_km)::numeric) AS \"📏 Range Start\",\n  ROUND(convert_distance(d.end_range_km)::numeric) AS \"📏 Range End\",\n  ROUND(convert_temp(d.outside_temp_avg)::numeric, 1) AS \"🌡️ Temp\"\nFROM v_drives d\nWHERE d.vehicle_id = ${vehicle_id}\n  AND $__timeFilter(d.start_date)\nORDER BY d.start_date DESC\nLIMIT 200",
              "refId": "A"
            }
          ],
          "title": "Drive History",
          "type": "table",
          "transparent": false
        }
