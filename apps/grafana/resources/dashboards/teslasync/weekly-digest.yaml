              "rawQuery": true,
              "rawSql": "SELECT\n  'Drive' AS \"Type\",\n  start_date AS \"Start\",\n  COALESCE(start_address, '—') AS \"From\",\n  COALESCE(end_address, '—') AS \"To\",\n  ROUND(distance::numeric, 1) AS \"Distance\",\n  ROUND(duration_min::numeric, 0) AS \"Duration (min)\",\n  NULL AS \"Energy Added\"\nFROM drives\nWHERE vehicle_id = ${vehicle_id} AND start_date >= DATE_TRUNC('week', NOW())\n\nUNION ALL\n\nSELECT\n  'Charge',\n  start_date,\n  COALESCE(location_name, '—'),\n  '—',\n  NULL,\n  ROUND(EXTRACT(EPOCH FROM end_date - start_date) / 60, 0),\n  ROUND(energy_added_kwh::numeric, 1)\nFROM charging_sessions\nWHERE vehicle_id = ${vehicle_id} AND start_date >= DATE_TRUNC('week', NOW())\n\nORDER BY \"Start\" DESC",
