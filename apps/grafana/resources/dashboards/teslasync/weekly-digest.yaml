              "rawSql": "WITH this_week AS (\n  SELECT 'This Week' AS period,\n    COALESCE(SUM(distance), 0) AS km,\n    COUNT(*) AS drives,\n    COALESCE(SUM(energy_used_kwh), 0) AS kwh\n  FROM drives\n  WHERE vehicle_id = ${vehicle_id}\n    AND start_date >= DATE_TRUNC('week', NOW())\n),\nlast_week AS (\n  SELECT 'Last Week' AS period,\n    COALESCE(SUM(distance), 0) AS km,\n    COUNT(*) AS drives,\n    COALESCE(SUM(energy_used_kwh), 0) AS kwh\n  FROM drives\n  WHERE vehicle_id = ${vehicle_id}\n    AND start_date >= DATE_TRUNC('week', NOW()) - INTERVAL '7 days'\n    AND start_date < DATE_TRUNC('week', NOW())\n)\nSELECT * FROM this_week\nUNION ALL\nSELECT * FROM last_week",
