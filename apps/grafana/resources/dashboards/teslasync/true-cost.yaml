              "editorMode": "code",
              "format": "time_series",
              "rawQuery": true,
              "rawSql": "SELECT\n  DATE_TRUNC('month', cs.start_date) AS time,\n  ROUND(\n    SUM(cs.cost)::numeric /\n    NULLIF((SELECT SUM(d.distance) FROM drives d\n            WHERE d.vehicle_id = ${vehicle_id}\n            AND DATE_TRUNC('month', d.start_date) = DATE_TRUNC('month', cs.start_date)), 0)\n  , 4) AS \"Cost/km\"\nFROM charging_sessions cs\nWHERE cs.vehicle_id = ${vehicle_id}\n  AND $__timeFilter(cs.start_date)\n  AND cs.cost > 0\nGROUP BY DATE_TRUNC('month', cs.start_date)\nORDER BY time",
