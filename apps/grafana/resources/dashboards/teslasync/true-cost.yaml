          },
          "targets": [
            {
              "datasource": {
                "type": "grafana-postgresql-datasource",
                "uid": "DS_TESLASYNC_POSTGRESQL"
              },
              "editorMode": "code",
              "format": "table",
              "rawQuery": true,
              "rawSql": "WITH monthly_ev AS (\n  SELECT\n    DATE_TRUNC('month', cs.start_date) AS month,\n    SUM(COALESCE(cs.cost, 0)) AS ev_cost\n  FROM charging_sessions cs\n  WHERE cs.vehicle_id = ${vehicle_id}\n    AND $__timeFilter(cs.start_date)\n  GROUP BY DATE_TRUNC('month', cs.start_date)\n),\nmonthly_km AS (\n  SELECT\n    DATE_TRUNC('month', d.start_date) AS month,\n    SUM(d.distance) AS km\n  FROM drives d\n  WHERE d.vehicle_id = ${vehicle_id}\n    AND $__timeFilter(d.start_date)\n  GROUP BY DATE_TRUNC('month', d.start_date)\n),\nmonthly_gas AS (\n  SELECT\n    DATE_TRUNC('month', recorded_at) AS month,\n    AVG(price) AS avg_price\n  FROM gas_prices\n  WHERE $__timeFilter(recorded_at)\n  GROUP BY DATE_TRUNC('month', recorded_at)\n)\nSELECT\n  e.month AS time,\n  ROUND(e.ev_cost::numeric, 2) AS \"EV Cost\",\n  ROUND((COALESCE(k.km, 0) / 1.60934 / 30.0 * COALESCE(g.avg_price, 3.50))::numeric, 2) AS \"Gas Equivalent\",\n  ROUND((COALESCE(k.km, 0) / 1.60934 / 30.0 * COALESCE(g.avg_price, 3.50) - e.ev_cost)::numeric, 2) AS \"Savings\"\nFROM monthly_ev e\nLEFT JOIN monthly_km k ON k.month = e.month\nLEFT JOIN monthly_gas g ON g.month = e.month\nORDER BY e.month",
              "refId": "A"
            }
