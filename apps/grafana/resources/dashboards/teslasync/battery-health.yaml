              "rawSql": "SELECT\n  $__timeGroup(created_at, '5m') AS \"Time\",\n  last(value_str, created_at) FILTER (WHERE signal = 'BMSState') AS \"BMS State\",\n  last(value_num, created_at) FILTER (WHERE signal = 'IsolationResistance') AS \"Isolation (Ω)\",\n  last(value_num, created_at) FILTER (WHERE signal = 'LifetimeEnergyUsed') AS \"Lifetime Energy (kWh)\",\n  CASE WHEN last(value_bool, created_at) FILTER (WHERE signal = 'BatteryHeaterOn') THEN 'ON' ELSE 'Off' END AS \"Battery Heater\"\nFROM signal_log\nWHERE vehicle_id = ${vehicle_id}\n  AND created_at BETWEEN $__timeFrom() AND $__timeTo()\n  AND signal IN ('BMSState', 'IsolationResistance', 'LifetimeEnergyUsed', 'BatteryHeaterOn')\nGROUP BY 1\nORDER BY 1 DESC\nLIMIT 20",
