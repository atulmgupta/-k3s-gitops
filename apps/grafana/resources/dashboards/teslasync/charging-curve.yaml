      "panels": [
        {
          "datasource": {
            "type": "grafana-postgresql-datasource",
            "uid": "DS_TESLASYNC_POSTGRESQL"
          },
          "description": "The signature charging curve — plots charge power (kW) against State of Charge (%). Shows how charge rate tapers as the battery fills. Overlays the last 5 sessions for comparison.",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
