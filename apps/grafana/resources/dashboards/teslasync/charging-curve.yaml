          },
          "transformations": [
            {
              "id": "partitionByValues",
              "options": {
                "fields": [
                  "Session"
                ],
                "keepFields": false
              }
            }
          ],
          "targets": [
            {
              "datasource": {
                "type": "grafana-postgresql-datasource",
                "uid": "DS_TESLASYNC_POSTGRESQL"
              },
              "editorMode": "code",
              "format": "table",
              "rawQuery": true,
              "rawSql": "SELECT\n  ctr.battery_level AS \"SoC %\",\n  ctr.power_kw AS \"Power (kW)\",\n  TO_CHAR(cs.start_date, 'YYYY-MM-DD HH24:MI') AS \"Session\"\nFROM charge_telemetry_readings ctr\nJOIN charging_sessions cs ON ctr.session_id = cs.id\nWHERE cs.vehicle_id = ${vehicle_id}\n  AND ctr.power_kw IS NOT NULL\n  AND ctr.battery_level IS NOT NULL\n  AND cs.id IN (\n    SELECT id FROM charging_sessions\n    WHERE vehicle_id = ${vehicle_id}\n    ORDER BY start_date DESC\n    LIMIT 5\n  )\nORDER BY ctr.battery_level",
              "refId": "A"
            }
          ],
          "title": "⚡ Charge Rate vs SoC Curve",
          "type": "xychart",
          "transparent": false
        },
        {
          "datasource": {
            "type": "grafana-postgresql-datasource",
            "uid": "DS_TESLASYNC_POSTGRESQL"
          },
          "description": "Battery temperature trend during a charging session. High temps during fast charging accelerate degradation.",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "fixed"
              },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 0,
                "gradientMode": "none",
                "hideFrom": {
                  "legend": false,
                  "tooltip": false,
                  "viz": false
                },
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "scaleDistribution": {
                  "type": "linear"
                },
                "showPoints": "auto",
                "spanNulls": false,
                "stacking": {
                  "group": "A",
                  "mode": "none"
                },
                "thresholdsStyle": {
                  "mode": "line"
                }
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 40
                  }
                ]
              },
              "unit": "celsius"
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "Battery Temp"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "fixedColor": "#FF9830",
                      "mode": "fixed"
                    }
                  },
                  {
                    "id": "custom.fillOpacity",
                    "value": 10
                  },
                  {
                    "id": "custom.fillBelowTo",
                    "value": "Battery Temp"
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "Outside Temp"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "fixedColor": "#8e8e8e",
                      "mode": "fixed"
                    }
                  },
                  {
                    "id": "custom.lineStyle",
                    "value": {
                      "dash": [10, 10],
                      "fill": "dash"
                    }
                  }
                ]
              }
            ]
          },
          "gridPos": {
            "h": 10,
            "w": 12,
            "x": 12,
            "y": 12
          },
          "id": 2,
          "options": {
            "legend": {
              "calcs": ["mean", "max"],
              "displayMode": "table",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "grafana-postgresql-datasource",
                "uid": "DS_TESLASYNC_POSTGRESQL"
              },
              "editorMode": "code",
              "format": "time_series",
              "rawQuery": true,
              "rawSql": "SELECT\n  created_at AS time,\n  battery_temp AS \"Battery Temp\",\n  outside_temp AS \"Outside Temp\"\nFROM charge_telemetry_readings\nWHERE session_id = ${session_id}\nORDER BY created_at",
              "refId": "A"
            }
          ],
          "title": "🌡️ Temperature During Charge",
          "type": "timeseries",
          "transparent": false
        }
      ],
