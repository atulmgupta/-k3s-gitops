              "rawSql": "SELECT created_at AS \"Time\",\n  MAX(value_num) FILTER (WHERE signal = 'HvacSteeringWheelHeatLevel') AS \"Steering Wheel Level\",\n  CASE WHEN MAX(value_str) FILTER (WHERE signal = 'DefrostMode') IS NOT NULL AND MAX(value_str) FILTER (WHERE signal = 'DefrostMode') != '' THEN 'ON' ELSE 'Off' END AS \"Defrost\",\n  CASE WHEN bool_or(value_bool) FILTER (WHERE signal = 'RearDefrostEnabled') THEN 'ON' ELSE 'Off' END AS \"Rear Defrost\",\n  CASE WHEN bool_or(value_bool) FILTER (WHERE signal = 'WiperHeatEnabled') THEN 'ON' ELSE 'Off' END AS \"Wiper Heat\",\n  COALESCE(MAX(value_str) FILTER (WHERE signal = 'ClimateKeeperMode'), 'Off') AS \"Climate Keeper\",\n  COALESCE(MAX(value_str) FILTER (WHERE signal = 'CabinOverheatProtectionMode'), 'Off') AS \"Overheat Protection\"\nFROM signal_log\nWHERE vehicle_id = ${vehicle_id}\n  AND signal IN ('HvacSteeringWheelHeatLevel', 'DefrostMode', 'RearDefrostEnabled', 'WiperHeatEnabled', 'ClimateKeeperMode', 'CabinOverheatProtectionMode')\n  AND created_at BETWEEN $__timeFrom() AND $__timeTo()\nGROUP BY created_at\nORDER BY created_at DESC\nLIMIT 50",
