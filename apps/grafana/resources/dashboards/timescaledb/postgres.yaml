---
apiVersion: v1
kind: ConfigMap
metadata:
  name: timescaledb-postgres
  namespace: grafana
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: TimescaleDB
data:
  postgres.json: |
    {
      "uid": "timescaledb-postgres",
      "title": "TimescaleDB - PostgreSQL",
      "tags": ["timescaledb", "postgres", "database"],
      "timezone": "browser",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-3h", "to": "now" },
      "editable": true,
      "graphTooltip": 1,
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": { "text": "Prometheus", "value": "Prometheus" },
            "hide": 0
          },
          {
            "name": "instance",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "${datasource}" },
            "query": "label_values(pg_up{namespace=\"timescaledb\"}, instance)",
            "refresh": 2,
            "includeAll": true,
            "multi": true,
            "current": { "text": "All", "value": "$__all" }
          },
          {
            "name": "datname",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "${datasource}" },
            "query": "label_values(pg_stat_database_xact_commit{namespace=\"timescaledb\",instance=~\"$instance\"}, datname)",
            "refresh": 2,
            "includeAll": true,
            "multi": true,
            "current": { "text": "All", "value": "$__all" }
          }
        ]
      },
      "panels": [
        {
          "id": 1, "type": "stat", "title": "Postgres Up",
          "gridPos": { "x": 0, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [{ "expr": "max(pg_up{namespace=\"timescaledb\",instance=~\"$instance\"})", "refId": "A" }],
          "fieldConfig": { "defaults": { "mappings": [{ "options": { "0": { "text": "DOWN", "color": "red" }, "1": { "text": "UP", "color": "green" } }, "type": "value" }], "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "green", "value": 1 }] }, "color": { "mode": "thresholds" } } }
        },
        {
          "id": 2, "type": "stat", "title": "DB Size",
          "gridPos": { "x": 4, "y": 0, "w": 5, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [{ "expr": "sum(pg_database_size_bytes{namespace=\"timescaledb\",instance=~\"$instance\",datname=~\"$datname\"})", "refId": "A" }],
          "fieldConfig": { "defaults": { "unit": "bytes" } }
        },
        {
          "id": 3, "type": "stat", "title": "Active Connections",
          "gridPos": { "x": 9, "y": 0, "w": 5, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [{ "expr": "sum(pg_stat_activity_count{namespace=\"timescaledb\",instance=~\"$instance\"})", "refId": "A" }],
          "fieldConfig": { "defaults": { "unit": "short", "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 100 }, { "color": "red", "value": 180 }] }, "color": { "mode": "thresholds" } } }
        },
        {
          "id": 4, "type": "stat", "title": "Max Connections",
          "gridPos": { "x": 14, "y": 0, "w": 5, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [{ "expr": "max(pg_settings_max_connections{namespace=\"timescaledb\",instance=~\"$instance\"})", "refId": "A" }],
          "fieldConfig": { "defaults": { "unit": "short" } }
        },
        {
          "id": 5, "type": "stat", "title": "Cache Hit Ratio (5m)",
          "gridPos": { "x": 19, "y": 0, "w": 5, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [{ "expr": "sum(rate(pg_stat_database_blks_hit{namespace=\"timescaledb\",instance=~\"$instance\",datname=~\"$datname\"}[5m])) / clamp_min(sum(rate(pg_stat_database_blks_hit{namespace=\"timescaledb\",instance=~\"$instance\",datname=~\"$datname\"}[5m])) + sum(rate(pg_stat_database_blks_read{namespace=\"timescaledb\",instance=~\"$instance\",datname=~\"$datname\"}[5m])), 1)", "refId": "A" }],
          "fieldConfig": { "defaults": { "unit": "percentunit", "min": 0, "max": 1, "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "yellow", "value": 0.95 }, { "color": "green", "value": 0.99 }] }, "color": { "mode": "thresholds" } } }
        },
        {
          "id": 10, "type": "timeseries", "title": "Connections by State",
          "gridPos": { "x": 0, "y": 4, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [{ "expr": "sum by (state) (pg_stat_activity_count{namespace=\"timescaledb\",instance=~\"$instance\"})", "legendFormat": "{{state}}", "refId": "A" }],
          "fieldConfig": { "defaults": { "unit": "short", "custom": { "drawStyle": "line", "fillOpacity": 20, "stacking": { "mode": "normal" } } } }
        },
        {
          "id": 11, "type": "timeseries", "title": "Transactions / sec",
          "gridPos": { "x": 12, "y": 4, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            { "expr": "sum by (datname) (rate(pg_stat_database_xact_commit{namespace=\"timescaledb\",instance=~\"$instance\",datname=~\"$datname\"}[5m]))", "legendFormat": "commit {{datname}}", "refId": "A" },
            { "expr": "sum by (datname) (rate(pg_stat_database_xact_rollback{namespace=\"timescaledb\",instance=~\"$instance\",datname=~\"$datname\"}[5m]))", "legendFormat": "rollback {{datname}}", "refId": "B" }
          ],
          "fieldConfig": { "defaults": { "unit": "ops" } }
        },
        {
          "id": 12, "type": "timeseries", "title": "Tuples (insert/update/delete) / sec",
          "gridPos": { "x": 0, "y": 12, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            { "expr": "sum(rate(pg_stat_database_tup_inserted{namespace=\"timescaledb\",instance=~\"$instance\",datname=~\"$datname\"}[5m]))", "legendFormat": "inserted", "refId": "A" },
            { "expr": "sum(rate(pg_stat_database_tup_updated{namespace=\"timescaledb\",instance=~\"$instance\",datname=~\"$datname\"}[5m]))", "legendFormat": "updated", "refId": "B" },
            { "expr": "sum(rate(pg_stat_database_tup_deleted{namespace=\"timescaledb\",instance=~\"$instance\",datname=~\"$datname\"}[5m]))", "legendFormat": "deleted", "refId": "C" },
            { "expr": "sum(rate(pg_stat_database_tup_fetched{namespace=\"timescaledb\",instance=~\"$instance\",datname=~\"$datname\"}[5m]))", "legendFormat": "fetched", "refId": "D" }
          ],
          "fieldConfig": { "defaults": { "unit": "ops" } }
        },
        {
          "id": 13, "type": "timeseries", "title": "Block I/O — hits vs reads / sec",
          "gridPos": { "x": 12, "y": 12, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            { "expr": "sum(rate(pg_stat_database_blks_hit{namespace=\"timescaledb\",instance=~\"$instance\",datname=~\"$datname\"}[5m]))", "legendFormat": "buffer hits", "refId": "A" },
            { "expr": "sum(rate(pg_stat_database_blks_read{namespace=\"timescaledb\",instance=~\"$instance\",datname=~\"$datname\"}[5m]))", "legendFormat": "disk reads", "refId": "B" }
          ],
          "fieldConfig": { "defaults": { "unit": "ops" } }
        },
        {
          "id": 14, "type": "timeseries", "title": "Locks by mode",
          "gridPos": { "x": 0, "y": 20, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [{ "expr": "sum by (mode) (pg_locks_count{namespace=\"timescaledb\",instance=~\"$instance\"})", "legendFormat": "{{mode}}", "refId": "A" }],
          "fieldConfig": { "defaults": { "unit": "short", "custom": { "drawStyle": "line", "fillOpacity": 10 } } }
        },
        {
          "id": 15, "type": "timeseries", "title": "Deadlocks / Conflicts / sec",
          "gridPos": { "x": 12, "y": 20, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            { "expr": "sum by (datname) (rate(pg_stat_database_deadlocks{namespace=\"timescaledb\",instance=~\"$instance\",datname=~\"$datname\"}[5m]))", "legendFormat": "deadlocks {{datname}}", "refId": "A" },
            { "expr": "sum by (datname) (rate(pg_stat_database_conflicts{namespace=\"timescaledb\",instance=~\"$instance\",datname=~\"$datname\"}[5m]))", "legendFormat": "conflicts {{datname}}", "refId": "B" }
          ],
          "fieldConfig": { "defaults": { "unit": "ops" } }
        },
        {
          "id": 16, "type": "timeseries", "title": "Database size (bytes)",
          "gridPos": { "x": 0, "y": 28, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [{ "expr": "pg_database_size_bytes{namespace=\"timescaledb\",instance=~\"$instance\",datname=~\"$datname\"}", "legendFormat": "{{datname}}", "refId": "A" }],
          "fieldConfig": { "defaults": { "unit": "bytes" } }
        },
        {
          "id": 17, "type": "timeseries", "title": "Temp files / bytes per sec",
          "gridPos": { "x": 12, "y": 28, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            { "expr": "sum by (datname) (rate(pg_stat_database_temp_files{namespace=\"timescaledb\",instance=~\"$instance\",datname=~\"$datname\"}[5m]))", "legendFormat": "files {{datname}}", "refId": "A" },
            { "expr": "sum by (datname) (rate(pg_stat_database_temp_bytes{namespace=\"timescaledb\",instance=~\"$instance\",datname=~\"$datname\"}[5m]))", "legendFormat": "bytes/s {{datname}}", "refId": "B" }
          ],
          "fieldConfig": { "defaults": { "unit": "short" } }
        }
      ]
    }
