---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
  labels:
    tier: monitoring
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: grafana
    targetRevision: "8.*"
    helm:
      valuesObject:
        admin:
          existingSecret: grafana-admin-secret
          passwordKey: password
        smtp:
          existingSecret: grafana-smtp-secret
          userKey: user
          passwordKey: password
        env:
          GF_SERVER_ROOT_URL: https://grafana.cyphers.app
          GF_AUTH_GENERIC_OAUTH_TOKEN_URL: http://authentik-server.authentik.svc.cluster.local/application/o/token/
          GF_AUTH_GENERIC_OAUTH_API_URL: http://authentik-server.authentik.svc.cluster.local/application/o/userinfo/
          GF_SMTP_ENABLED: "true"
          GF_SMTP_HOST: smtp.sendgrid.net
          GF_SMTP_FROM_ADDRESS: grafana@cyphers.app
          GF_SMTP_FROM_NAME: Cyphers Grafana
          GF_SMTP_SKIP_VERIFY: "false"
        persistence:
          enabled: true
          existingClaim: grafana-pvc
          size: 10Gi
          storageClassName: longhorn
        service:
          type: ClusterIP
          port: 3000
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        sidecar:
          dashboards:
            enabled: true
            label: grafana_dashboard
            labelValue: "1"
            folder: /tmp/dashboards
            folderAnnotation: grafana_folder
            searchNamespace: ALL
            provider:
              foldersFromFilesStructure: true
          datasources:
            enabled: true
            label: grafana_datasource
            labelValue: "1"
            searchNamespace: ALL
        dashboardProviders:
          dashboardproviders.yaml:
            apiVersion: 1
            providers:
              - name: infrastructure
                orgId: 1
                folder: Infrastructure
                type: file
                disableDeletion: false
                editable: true
                options:
                  path: /var/lib/grafana/dashboards/infrastructure
              - name: kubernetes
                orgId: 1
                folder: Kubernetes
                type: file
                disableDeletion: false
                editable: true
                options:
                  path: /var/lib/grafana/dashboards/kubernetes
              - name: databases
                orgId: 1
                folder: Databases
                type: file
                disableDeletion: false
                editable: true
                options:
                  path: /var/lib/grafana/dashboards/databases
              - name: messaging
                orgId: 1
                folder: Messaging
                type: file
                disableDeletion: false
                editable: true
                options:
                  path: /var/lib/grafana/dashboards/messaging
        dashboards:
          infrastructure:
            node-exporter-full:
              gnetId: 1860
              revision: 37
              datasource: Prometheus
            node-exporter-nodes:
              gnetId: 15172
              revision: 2
              datasource: Prometheus
            traefik:
              gnetId: 17346
              revision: 9
              datasource: Prometheus
            longhorn:
              gnetId: 16888
              revision: 9
              datasource: Prometheus
            cert-manager:
              gnetId: 20842
              revision: 3
              datasource: Prometheus
            coredns:
              gnetId: 15762
              revision: 18
              datasource: Prometheus
            metallb:
              gnetId: 14127
              revision: 1
              datasource: Prometheus
            authentik:
              gnetId: 14837
              revision: 2
              datasource: Prometheus
          kubernetes:
            k8s-cluster:
              gnetId: 7249
              revision: 1
              datasource: Prometheus
            k8s-pods:
              gnetId: 6336
              revision: 1
              datasource: Prometheus
            k8s-namespaces:
              gnetId: 15758
              revision: 35
              datasource: Prometheus
            k8s-persistent-volumes:
              gnetId: 13646
              revision: 2
              datasource: Prometheus
            k8s-api-server:
              gnetId: 15761
              revision: 17
              datasource: Prometheus
          databases:
            postgresql:
              gnetId: 9628
              revision: 7
              datasource: Prometheus
            redis:
              gnetId: 11835
              revision: 1
              datasource: Prometheus
            mongodb:
              gnetId: 7353
              revision: 3
              datasource: Prometheus
          messaging:
            emqx:
              gnetId: 17446
              revision: 1
              datasource:
                - name: DS_EMQX_PROMETHEUS
                  value: Prometheus
  destination:
    server: https://kubernetes.default.svc
    namespace: grafana
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
