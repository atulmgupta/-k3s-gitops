---
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: ip-allowlist
  namespace: authentik
spec:
  ipAllowList:
    sourceRange:
      - 192.168.68.0/24
      - 10.42.0.0/16
      - 10.43.0.0/16
    # 192.168.68.0/24 — home LAN
    # 10.42.0.0/16    — k3s pod CIDR
    # 10.43.0.0/16    — k3s service CIDR
