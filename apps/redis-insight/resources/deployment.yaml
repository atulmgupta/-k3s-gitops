apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-insight
  labels:
    app.kubernetes.io/name: redis-insight
    app.kubernetes.io/instance: redis-insight
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: redis-insight
      app.kubernetes.io/instance: redis-insight
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis-insight
        app.kubernetes.io/instance: redis-insight
    spec:
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: redis-insight
          image: redis/redisinsight:2.62
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5540
              protocol: TCP
          env:
            - name: RI_APP_PORT
              value: "5540"
            - name: RI_APP_HOST
              value: "0.0.0.0"
            - name: RI_PROXY_PATH
              value: "/"
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: redis-insight-data
