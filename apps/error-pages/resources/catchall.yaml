apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: catchall-error-pages
  namespace: error-pages
  annotations:
    kubernetes.io/ingress.class: traefik-external
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: HostRegexp(`{subdomain:[a-z0-9-]+}.cyphers.app`)
      priority: 1
      services:
        - name: error-pages-custom-error-pages
          namespace: error-pages
          port: 8080
  tls:
    secretName: production-cyphers-app-tls
