# Service name must match the Traefik global-error-pages middleware reference
apiVersion: v1
kind: Service
metadata:
  name: error-pages-custom-error-pages
  labels:
    app.kubernetes.io/name: custom-error-pages
    app.kubernetes.io/instance: error-pages
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Error Pages"
    gethomepage.dev/group: "Infrastructure"
    gethomepage.dev/icon: "mdi-alert-circle"
    gethomepage.dev/href: "#"
    gethomepage.dev/description: "Custom Error Pages"
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: custom-error-pages
    app.kubernetes.io/instance: error-pages
