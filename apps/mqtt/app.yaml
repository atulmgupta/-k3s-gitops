# =============================================================================
# MQTT (EMQX) — Resources Application (ArgoCD)
# =============================================================================
# Exposes EMQX dashboard at mqtt.cyphers.app behind authentik.
# =============================================================================
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mqtt-resources
  namespace: argocd
  labels:
    tier: infra
spec:
  project: default
  source:
    repoURL: https://github.com/atulmgupta/-k3s-gitops.git
    targetRevision: main
    path: apps/mqtt/resources
    kustomize: {}
  destination:
    server: https://kubernetes.default.svc
    namespace: mqtt
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
