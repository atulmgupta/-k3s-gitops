---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nextcloud-resources
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/atulmgupta/-k3s-gitops.git
    targetRevision: main
    path: apps/nextcloud/resources
    kustomize: {}
  destination:
    server: https://kubernetes.default.svc
    namespace: nextcloud
  syncPolicy:
    syncOptions: [CreateNamespace=true]
