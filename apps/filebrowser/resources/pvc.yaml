apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: filebrowser-data
  labels:
    app.kubernetes.io/name: filebrowser
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: filebrowser-config
  labels:
    app.kubernetes.io/name: filebrowser
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi
