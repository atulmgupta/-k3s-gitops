# =============================================================================
# Redis — Helm Application (ArgoCD)
# =============================================================================
# Bitnami Redis with master-replica architecture.
# Used by: Authentik, VitaSync, EchoStats, Nexus Terminal, Outline, TeslaSync
# ⚠️ MANUAL SYNC ONLY — database infrastructure.
# =============================================================================
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis
  namespace: argocd
  labels:
    tier: database
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: redis
    targetRevision: "25.3.9"
    helm:
      releaseName: redis
      valuesObject:
        architecture: replication

        auth:
          enabled: true
          existingSecret: redis-credentials
          existingSecretPasswordKey: redis-password

        global:
          defaultStorageClass: longhorn
          storageClass: longhorn

        master:
          persistence:
            enabled: true
            size: 8Gi
          service:
            type: NodePort
          resourcesPreset: nano

        replica:
          replicaCount: 3
          persistence:
            enabled: true
            size: 8Gi
          resourcesPreset: nano

        commonConfiguration: |-
          appendonly yes
          save ""

        networkPolicy:
          enabled: true
          allowExternal: true

        metrics:
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: redis
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: redis
      jsonPointers: [/data]
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
