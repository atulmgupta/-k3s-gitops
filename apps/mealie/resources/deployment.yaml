apiVersion: apps/v1
kind: Deployment
metadata:
  name: mealie
  labels:
    app.kubernetes.io/name: mealie
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mealie
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mealie
    spec:
      containers:
        - name: mealie
          image: ghcr.io/mealie-recipes/mealie:latest
          ports:
            - name: http
              containerPort: 9000
          env:
            - name: ALLOW_SIGNUP
              value: "false"
            - name: TZ
              value: America/Los_Angeles
            - name: BASE_URL
              value: https://mealie.cyphers.app
            - name: DB_ENGINE
              value: postgres
            - name: POSTGRES_SERVER
              value: postgres-v17-postgresql.postgres-v17.svc.cluster.local
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: mealie
            - name: POSTGRES_USER
              value: mealie
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mealie-secret
                  key: DB_PASSWORD
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
          volumeMounts:
            - name: data
              mountPath: /app/data
          livenessProbe:
            httpGet: { path: /api/app/about, port: http }
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /api/app/about, port: http }
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mealie-data
