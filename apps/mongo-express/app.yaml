# =============================================================================
# Mongo Express — Kustomize Application (ArgoCD)
# =============================================================================
# Web UI for the cluster's MongoDB. Behind Authentik. Mongo URI sourced from
# a SOPS-encrypted Secret (KSOPS generator).
# =============================================================================
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mongo-express
  namespace: argocd
  labels:
    tier: tools
spec:
  project: default
  source:
    repoURL: https://github.com/atulmgupta/-k3s-gitops.git
    targetRevision: main
    path: apps/mongo-express/resources
    kustomize: {}
  destination:
    server: https://kubernetes.default.svc
    namespace: mongo-express
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
