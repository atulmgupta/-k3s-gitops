# =============================================================================
# Root App — applies every Application YAML found under apps/
# =============================================================================
# This is the ONLY thing you kubectl apply manually. Everything else is GitOps.
#
#   kubectl apply -f apps/root.yaml
#
# ArgoCD then discovers and manages all child Applications automatically.
# =============================================================================
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/atulmgupta/k3s-gitops.git
    targetRevision: main
    path: apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
