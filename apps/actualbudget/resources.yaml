---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: actualbudget-resources
  namespace: argocd
  labels:
    tier: apps
spec:
  project: default
  source:
    repoURL: https://github.com/atulmgupta/-k3s-gitops.git
    targetRevision: main
    path: apps/actualbudget/resources
    kustomize: {}
  destination:
    server: https://kubernetes.default.svc
    namespace: actualbudget
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
