apiVersion: apps/v1
kind: Deployment
metadata:
  name: ntfy
  labels:
    app.kubernetes.io/name: ntfy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ntfy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ntfy
    spec:
      containers:
        - name: ntfy
          image: binwiederhier/ntfy:latest
          args: ["serve"]
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: NTFY_BASE_URL
              value: https://ntfy.cyphers.app
            - name: NTFY_BEHIND_PROXY
              value: "true"
            - name: NTFY_CACHE_FILE
              value: /var/cache/ntfy/cache.db
            - name: NTFY_ATTACHMENT_CACHE_DIR
              value: /var/cache/ntfy/attachments
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: cache
              mountPath: /var/cache/ntfy
          livenessProbe:
            httpGet:
              path: /v1/health
              port: http
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /v1/health
              port: http
            periodSeconds: 10
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: ntfy-cache
