# =============================================================================
# SOPS — age encryption for secrets
# =============================================================================
creation_rules:
  # K8s Secret manifests — only encrypt data/stringData (metadata stays readable)
  - path_regex: .*secret.*\.yaml$
    age: >-
      age1nqt7rptevevv0se64ryupta6zpdr4zzh9rhg4aec9xfqhsyw23cquqzrj0
    encrypted_regex: "^(data|stringData)$"
  # Datasource files (contain DB credentials)
  - path_regex: .*datasource.*\.yaml$
    age: >-
      age1nqt7rptevevv0se64ryupta6zpdr4zzh9rhg4aec9xfqhsyw23cquqzrj0
    encrypted_regex: "^(data|stringData)$"
  # General secrets files
  - path_regex: .*secrets?\.yaml$
    age: >-
      age1nqt7rptevevv0se64ryupta6zpdr4zzh9rhg4aec9xfqhsyw23cquqzrj0
